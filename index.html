<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Prompt Vault Pro | AI Cloud Center</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<style>
    
:root {
  --bg:#07070d; --surface:#0f0f1a; --surface2:#1a1a2e; --border:#2a2a48; 
  --cyan:#22d3ee; --purple:#c4b5fd; --red:#f87171; --text:#ffffff; --muted:#a1a1aa;
  --gold:#fbbf24; --r:10px; --font-mono: 'Space Mono', monospace;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--text); font-family: var(--font-mono); display: flex; height: 100vh; overflow: hidden; }

/* --- SIDEBAR --- */
aside { width: 260px; background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; flex-shrink: 0; z-index: 2000; transition: 0.3s; position: relative; }
.nav-label { font-size: 11px; color: var(--cyan); text-transform: uppercase; letter-spacing: 1.5px; margin: 20px 15px 10px; display: flex; justify-content: space-between; align-items: center; font-weight: 700; }
.add-tool-btn { cursor: pointer; font-size: 14px; color: var(--muted); transition: 0.2s; }
.add-tool-btn:hover { color: var(--cyan); }

#close-sidebar { display: none; position: absolute; top: 15px; right: 15px; background: none; border: 1px solid var(--border); color: var(--cyan); font-size: 20px; cursor: pointer; width: 35px; height: 35px; border-radius: 50%; align-items: center; justify-content: center; z-index: 2010; }

.nav-item { padding: 10px 15px; cursor: pointer; font-size: 13px; display: flex; justify-content: space-between; align-items: center; transition: 0.2s; color: var(--muted); text-decoration: none; }
.nav-item:hover { background: rgba(255,255,255,0.05); color: var(--text); }
.nav-item.active { background: rgba(34,211,238,0.15); color: var(--text); }

.tag-cloud { padding: 10px 15px; display: flex; flex-wrap: wrap; gap: 6px; }
.tag-btn { font-size: 10px; background: var(--surface2); border: 1px solid var(--border); color: var(--text); padding: 4px 8px; border-radius: 4px; cursor: pointer; }

/* --- MAIN --- */
main { flex: 1; display: flex; flex-direction: column; background: var(--bg); position: relative; min-width: 0; }
.top-bar { padding: 12px 15px; border-bottom: 1px solid var(--border); display: flex; gap: 10px; align-items: center; background: rgba(7,7,13,0.9); backdrop-filter: blur(10px); }
.search-container { flex: 1; display: flex; align-items: center; background: var(--surface); border: 1px solid var(--border); border-radius: 6px; padding: 2px 10px; gap: 8px; }
.search-input { flex: 1; background: none; border: none; color: white; padding: 8px 0; outline: none; font-size: 14px; width: 100%; }
#tag-badge { display: none; align-items: center; background: rgba(34,211,238,0.1); border: 1px solid var(--cyan); color: var(--cyan); padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 700; gap: 6px; }

.btn-primary { background: var(--cyan); color: #000; border: none; padding: 10px 18px; border-radius: 6px; font-weight: 700; cursor: pointer; font-family: inherit; font-size: 12px; }

/* --- GRID --- */
.grid { flex: 1; overflow-y: auto; padding: 15px; display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 15px; }
.card { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; overflow: hidden; display: flex; flex-direction: column; position: relative; height: fit-content; transition: 0.2s; }
.card:hover { border-color: var(--cyan); }
.card-img { width: 100%; height: 120px; object-fit: cover; background: #000; cursor: pointer; }
.card-model { position: absolute; top: 90px; right: 8px; background: rgba(7, 7, 13, 0.8); backdrop-filter: blur(4px); color: var(--cyan); border: 1px solid var(--cyan); padding: 2px 8px; border-radius: 4px; font-size: 10px; font-weight: 700; z-index: 15; }

.card-link-label { position: absolute; top: 90px; left: 8px; background: rgba(7, 7, 13, 0.8); backdrop-filter: blur(4px); color: var(--cyan); border: 1px solid var(--cyan); padding: 2px 8px; border-radius: 4px; font-size: 10px; font-weight: 700; z-index: 15; text-decoration: none; transition: 0.2s; }
.card-link-label:hover { background: var(--cyan); color: #000; }

.card-content { padding: 12px; flex: 1; cursor: pointer; }
.card-title { font-weight: 700; font-size: 14px; color: var(--text); margin-bottom: 6px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.card-info-row { display: flex; justify-content: space-between; align-items: center; font-size: 10px; margin-bottom: 5px; }
.card-cat { color: var(--purple); font-weight: 700; }
.card-tags { display: flex; flex-wrap: nowrap; gap: 6px; margin-top: 8px; overflow-x: auto; white-space: nowrap; padding-bottom: 2px; scrollbar-width: none; }
.card-tags::-webkit-scrollbar { display: none; }
.card-hashtag { flex: 0 0 auto; font-size: 10px; color: var(--muted); background: rgba(255, 255, 255, 0.05); padding: 3px 8px; border-radius: 4px; cursor: pointer; }
.card-actions { display: grid; grid-template-columns: 1fr 1fr; border-top: 1px solid var(--border); }
.card-btn { background: var(--surface2); border: none; color: var(--text); padding: 12px; font-size: 11px; cursor: pointer; font-weight: 700; font-family: inherit; }
.card-btn:hover { background: var(--cyan); color: #000; }
.fav-btn-card { position: absolute; top: 8px; right: 8px; background: rgba(0,0,0,0.6); border: 1px solid rgba(255,255,255,0.1); color: #444; border-radius: 50%; width: 28px; height: 28px; display: flex; align-items: center; justify-content: center; cursor: pointer; z-index: 10; font-size: 14px; }
.fav-btn-card.active { color: var(--gold); border-color: var(--gold); }

/* --- MODALES --- */
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.9); backdrop-filter: blur(8px); display: none; align-items: center; justify-content: center; z-index: 3000; padding: 20px; }
.modal-overlay.open { display: flex; }
.modal { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; width: 100%; max-width: 850px; max-height: 90vh; overflow-y: auto; display: grid; grid-template-columns: 280px 1fr; position: relative; }

@media (max-width: 768px) {
    .modal { grid-template-columns: 1fr; }
    .modal-aside { border-right: none !important; border-bottom: 1px solid var(--border); }
    aside { position: fixed; height: 100vh; width: 100vw; left: 0; top: 0; transform: translateX(-100%); z-index: 4000; background: var(--surface); transition: 0.3s; }
    aside.open { transform: translateX(0); }
    #close-sidebar { display: flex; }
    .grid { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 30px 10px; padding: 15px; }
}

.modal label { font-size: 11px; color: var(--cyan); margin-bottom: 6px; display: block; font-weight: 700; text-transform: uppercase; }
.modal input, .modal textarea { width: 100%; font-size: 13px; color: var(--text); background: var(--bg); border: 1px solid var(--border); padding: 10px; border-radius: 6px; margin-bottom: 15px; font-family: inherit; outline: none; }

#copy-pos-modal, #copy-neg-modal { cursor: pointer; user-select: none; transition: 0.2s; background: rgba(34,211,238,0.1); padding: 2px 6px; border-radius: 4px; font-size: 9px; }
#copy-pos-modal:active, #copy-neg-modal:active { transform: scale(0.9); }

/* --- TOOLS GRID STYLE --- */
.tools-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 15px; padding: 20px; }
.tool-card { background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; padding: 15px; display: flex; flex-direction: column; align-items: center; text-align: center; gap: 10px; transition: 0.2s; cursor: pointer; position: relative; aspect-ratio: 1; justify-content: center; }
.tool-card:hover { border-color: var(--cyan); transform: translateY(-2px); }
.tool-card img { width: 40px; height: 40px; border-radius: 8px; }
.tool-card span { font-size: 12px; font-weight: 700; color: var(--text); overflow: hidden; text-overflow: ellipsis; width: 100%; }
.tool-card-actions { position: absolute; top: 5px; right: 5px; display: flex; gap: 5px; opacity: 0; transition: 0.2s; }
.tool-card:hover .tool-card-actions { opacity: 1; }
.tool-mini-btn { background: rgba(0,0,0,0.5); color: white; border: none; padding: 4px; border-radius: 4px; cursor: pointer; font-size: 10px; }

#weight-modal { position: absolute; background: #1a1a2e; border: 1px solid var(--cyan); border-radius: 6px; padding: 8px; z-index: 4000; display: none; flex-direction: column; gap: 5px; width: 130px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
#weight-modal input { background: #050508; border: 1px solid var(--border); color: white; padding: 4px; font-size: 10px; width: 100%; text-align: center; margin-bottom: 0; }
#weight-modal button { border: none; font-size: 9px; padding: 6px; cursor: pointer; font-weight: 700; border-radius: 4px; transition: 0.2s; }
#btn-apply-weight { background: var(--cyan); color: #000; }
#btn-undo-weight { background: #333; color: var(--red); border: 1px solid var(--red) !important; }
#toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: var(--cyan); color: #000; padding: 12px 24px; border-radius: 8px; font-weight: 700; display: none; z-index: 5000; font-size: 13px; }
</style>
</head>
<body>

<aside id="sidebar">
    <button id="close-sidebar">×</button>
    <div style="padding: 20px; font-family: 'Syne'; font-weight: 800; color: var(--cyan); font-size: 16px; border-bottom: 1px solid var(--border);">⬡ PROMPT VAULT</div>
    
    <div style="padding: 15px 15px 5px;">
        <button class="btn-primary" id="btn-new" style="width: 100%; letter-spacing: 1px;">+ NUEVO PROMPT</button>
    </div>

    <div style="flex: 1; overflow-y: auto;">
        <span class="nav-label">Biblioteca</span>
        <div class="nav-item active" data-filter="all" onclick="setGlobalFilter('all')">🏠 Todos</div>
        <div class="nav-item" data-filter="fav" onclick="setGlobalFilter('fav')">⭐ Favoritos</div>
        
        <span class="nav-label">Tools</span>
        <div id="category-list">
            <div class="nav-item cat-item" onclick="openToolsGrid('💡 INSPIRA')"><span>💡 INSPIRA</span><span class="add-tool-btn" data-cat="💡 INSPIRA">+</span></div>
            <div class="nav-item cat-item" onclick="openToolsGrid('🤖 IAS')"><span>🤖 IAS</span><span class="add-tool-btn" data-cat="🤖 IAS">+</span></div>
            <div class="nav-item cat-item" onclick="openToolsGrid('🖼️ IMG-TO-TXT')"><span>🖼️ IMG-TO-TXT</span><span class="add-tool-btn" data-cat="🖼️ IMG-TO-TXT">+</span></div>
            <div class="nav-item cat-item" onclick="openToolsGrid('🚀 EXPANDIR IA')"><span>🚀 EXPANDIR IA</span><span class="add-tool-btn" data-cat="🚀 EXPANDIR IA">+</span></div>
            <div class="nav-item cat-item" onclick="openToolsGrid('🎨 IMG GEN')"><span>🎨 IMG GEN</span><span class="add-tool-btn" data-cat="🎨 IMG GEN">+</span></div>
            <div class="nav-item cat-item" onclick="openToolsGrid('📂 REPOSITORIOS')"><span>📂 REPOSITORIOS</span><span class="add-tool-btn" data-cat="📂 REPOSITORIOS">+</span></div>
            <div class="nav-item cat-item" onclick="openToolsGrid('📖 ENCICLOPEDIA')"><span>📖 ENCICLOPEDIA</span><span class="add-tool-btn" data-cat="📖 ENCICLOPEDIA">+</span></div>
        </div>

        <span class="nav-label">Hashtags</span>
        <div id="sidebar-tags" class="tag-cloud"></div>
    </div>
</aside>

<main>
    <div class="top-bar">
        <button id="m-toggle" style="background:none; border:none; color:var(--cyan); font-size:24px; cursor:pointer;">☰</button>
        <div class="search-container">
            <div id="tag-badge">
                <span id="tag-text"></span>
                <span style="cursor:pointer" id="btn-clear-tag">×</span>
            </div>
            <input type="text" id="search-input" class="search-input" placeholder="Buscar en la bóveda...">
        </div>
        <button id="btn-config" style="background:none; border:1px solid var(--border); color:var(--cyan); padding:10px; border-radius:6px; cursor:pointer;">⚙</button>
    </div>
    <div id="main-grid" class="grid"></div>
</main>

<div class="modal-overlay" id="modal-edit">
    <div class="modal">
        <div class="modal-aside" style="padding:20px; border-right:1px solid var(--border); background:rgba(0,0,0,0.2)">
            <img id="prev-img" src="" style="width:100%; aspect-ratio:1; object-fit:cover; border-radius:8px; margin-bottom:15px; background:#000;">
            <label>Imagen URL</label><input type="text" id="inp-img">
            <label>Link Origen</label><input type="text" id="inp-link">
            <label>Etiqueta Link</label><input type="text" id="inp-link-label" placeholder="Ej: CivitAI">
            <label>Modelo IA</label><input type="text" id="inp-model">
        </div>
        <div class="modal-main" style="padding:20px">
            <input type="hidden" id="edit-id">
            <label>Título</label><input type="text" id="inp-titulo">
            <div style="display:grid; grid-template-columns:1fr 1fr; gap:15px">
                <div><label>Categoría</label><input type="text" id="inp-cat"></div>
                <div><label>Tags (#tag)</label><input type="text" id="inp-tags"></div>
            </div>
            <label>Positivo <span id="copy-pos-modal">COPIAR</span></label>
            <textarea id="inp-pos" rows="4" class="prompt-area" style="resize:vertical"></textarea>
            <label>Negativo <span id="copy-neg-modal">COPIAR</span></label>
            <textarea id="inp-neg" rows="2" class="prompt-area" style="resize:vertical"></textarea>
            <label>Notas</label><textarea id="inp-notas" rows="2" style="resize:vertical"></textarea>
            <div style="display:flex; gap:10px">
                <button class="btn-primary" style="flex:1" id="btn-save">💾 GUARDAR</button>
                <button id="btn-delete" style="color:var(--red); border:1px solid var(--red); background:none; padding:10px; border-radius:6px; cursor:pointer">🗑</button>
                <button class="close-trigger" style="padding:10px; border-radius:6px; background:none; border:1px solid var(--border); color:var(--muted); cursor:pointer">Cerrar</button>
            </div>
        </div>
    </div>
</div>

<div class="modal-overlay" id="modal-config">
    <div class="modal" style="display:block; padding:20px; max-width:400px">
        <label>Token GitHub</label><input type="password" id="cfg-token">
        <label>Repo (user/repo)</label><input type="text" id="cfg-repo">
        <label>Path JSON</label><input type="text" id="cfg-path">
        <button class="btn-primary" style="width:100%" id="btn-save-config">GUARDAR CONFIG</button>
        <button class="close-trigger" style="width:100%; margin-top:10px; background:none; border:none; color:var(--muted); cursor:pointer">Cerrar</button>
    </div>
</div>

<div class="modal-overlay" id="modal-tools-grid">
    <div class="modal" style="display:block; max-width:700px;">
        <div style="padding:20px; border-bottom:1px solid var(--border); display:flex; justify-content:space-between; align-items:center;">
            <h2 id="tools-grid-title" style="font-family:'Syne'; color:var(--cyan); font-size:18px;"></h2>
            <button class="close-trigger" style="background:none; border:none; color:var(--muted); cursor:pointer; font-size:20px;">×</button>
        </div>
        <div id="tools-container" class="tools-grid"></div>
    </div>
</div>

<div class="modal-overlay" id="modal-tool-form">
    <div class="modal" style="display:block; padding:20px; max-width:400px">
        <h3 id="tool-form-title" style="margin-bottom:15px; font-size:14px; color:var(--cyan)">NUEVO LINK</h3>
        <input type="hidden" id="tool-id">
        <input type="hidden" id="tool-category">
        <label>Nombre / Etiqueta</label><input type="text" id="tool-name" placeholder="Ej: Pinterest">
        <label>URL</label><input type="text" id="tool-url" placeholder="https://...">
        <div style="display:flex; gap:10px">
            <button class="btn-primary" style="flex:1" id="btn-save-tool">GUARDAR</button>
            <button class="close-trigger" style="background:none; border:none; color:var(--muted); cursor:pointer">Cancelar</button>
        </div>
    </div>
</div>

<div id="weight-modal">
    <input type="text" id="weight-input" value="1.2">
    <div style="display:flex; gap:4px">
        <button id="btn-apply-weight" style="flex:2">APLICAR</button>
        <button id="btn-undo-weight" style="flex:1.5">UNDO</button>
    </div>
</div>

<div id="toast"></div>

<script>
let items = []; let tools = []; let currentFilter = 'all';
let selectionData = { text: '', start: 0, end: 0, targetId: '' };

const getConfig = () => JSON.parse(localStorage.getItem('vault_config')) || { token: '', repo: '', path: '' };
const showToast = (m) => { const t = document.getElementById('toast'); t.innerText = m; t.style.display = 'block'; setTimeout(() => t.style.display='none', 2000); };

// Canal de sincronización en tiempo real con el panel
const vaultChannel = new BroadcastChannel('vault_sync');
function notifyPanel() {
    vaultChannel.postMessage({ type: 'vault_updated', items, tools });
}
// Escuchar cambios que vengan del panel
vaultChannel.onmessage = (e) => {
    if (e.data && e.data.type === 'vault_updated') {
        items = e.data.items || items;
        tools = e.data.tools || tools;
        localStorage.setItem('vault_data', JSON.stringify(items));
        localStorage.setItem('vault_tools', JSON.stringify(tools));
        renderAll();
    }
};

async function syncAll() {
    try { items = JSON.parse(localStorage.getItem('vault_data')) || []; tools = JSON.parse(localStorage.getItem('vault_tools')) || []; } catch(e) { items = []; tools = []; }
    renderAll();
    const cfg = getConfig(); if (!cfg.token || !cfg.repo) return;
    try {
        const url = `https://api.github.com/repos/${cfg.repo}/contents/${cfg.path}`;
        const res = await fetch(url, { headers: { 'Authorization': `token ${cfg.token}` } });
        if (res.ok) {
            const data = await res.json();
            const cloudData = JSON.parse(decodeURIComponent(escape(atob(data.content))));
            if (cloudData && typeof cloudData === 'object') {
                if (Array.isArray(cloudData.prompts)) items = cloudData.prompts;
                if (Array.isArray(cloudData.tools)) tools = cloudData.tools;
            }
            localStorage.setItem('vault_data', JSON.stringify(items)); 
            localStorage.setItem('vault_tools', JSON.stringify(tools));
            notifyPanel();
            renderAll();
        }
    } catch(e) { console.error(e); }
}

async function pushToGH() {
    const cfg = getConfig(); if (!cfg.token || !cfg.repo) return;
    const url = `https://api.github.com/repos/${cfg.repo}/contents/${cfg.path}`;
    const payload = { prompts: items, tools: tools };
    try {
        const gr = await fetch(url, { headers: { 'Authorization': `token ${cfg.token}` } });
        let sha = gr.ok ? (await gr.json()).sha : "";
        const content = btoa(unescape(encodeURIComponent(JSON.stringify(payload, null, 2))));
        await fetch(url, { method: 'PUT', headers: { 'Authorization': `token ${cfg.token}` }, body: JSON.stringify({ message: "Update Vault", content, sha }) });
        showToast("✓ Nube actualizada");
    } catch(e) { console.error(e); }
}

function renderGrid() {
    const q = document.getElementById('search-input').value.toLowerCase();
    const tagQuery = document.getElementById('tag-badge').style.display === 'flex' ? document.getElementById('tag-text').innerText.toLowerCase() : '';
    const filtered = items.filter(i => {
        const m = (i.titulo||'').toLowerCase().includes(q) || (i.tags||'').toLowerCase().includes(q) || (i.categoria||'').toLowerCase().includes(q);
        const t = tagQuery ? (i.tags || '').toLowerCase().includes(tagQuery) : true;
        return currentFilter === 'fav' ? (i.fav && m && t) : (m && t);
    });
    document.getElementById('main-grid').innerHTML = filtered.map(i => `
        <div class="card" data-id="${i.id}">
            <div class="fav-btn-card ${i.fav ? 'active' : ''}" onclick="toggleFav('${i.id}', event)">★</div>
            <img src="${i.imgUrl || 'https://via.placeholder.com/300x150?text=No+Image'}" class="card-img" onclick="openModal('${i.id}')">
            <span class="card-model">${i.modelo || 'SDXL'}</span> 
            ${i.link ? `<a href="${i.link}" target="_blank" class="card-link-label" onclick="event.stopPropagation()">${i.linkLabel || 'ORIGEN'} ↗</a>` : ''}
            <div class="card-content" onclick="openModal('${i.id}')">
                <div class="card-title">${i.titulo || 'Sin título'}</div>
                <div class="card-info-row"><span class="card-cat">${i.categoria || 'Gral'}</span></div>
                <div class="card-tags">${(i.tags||'').split(' ').filter(t=>t.startsWith('#')).map(t=>`<span class="card-hashtag" onclick="event.stopPropagation(); setSearch('${t}')">${t}</span>`).join('')}</div>
            </div>
            <div class="card-actions">
                <button class="card-btn" onclick="event.stopPropagation(); navigator.clipboard.writeText('${i.promptPos || ''}'); showToast('📋 Copiado');">📋 POS</button>
                <button class="card-btn" style="border-left:1px solid var(--border)" onclick="event.stopPropagation(); navigator.clipboard.writeText('${i.promptNeg || ''}'); showToast('📋 Copiado');">📋 NEG</button>
            </div>
        </div>`).join('');
}

function renderSidebar() {
    const tags = [...new Set(items.flatMap(i => (i.tags||'').split(' ').filter(t => t.startsWith('#'))))];
    document.getElementById('sidebar-tags').innerHTML = tags.map(t => `<button class="tag-btn" onclick="setSearch('${t}')">${t}</button>`).join('');
}

function renderAll() { renderGrid(); renderSidebar(); }

document.addEventListener('click', async (e) => {
    if (e.target.id === 'm-toggle') document.getElementById('sidebar').classList.toggle('open');
    if (e.target.id === 'close-sidebar') document.getElementById('sidebar').classList.remove('open');
    if (e.target.id === 'btn-new') openModal();
    if (e.target.id === 'btn-config') openConfig();
    
    if (e.target.id === 'btn-save-config') {
        const cfg = { token: document.getElementById('cfg-token').value.trim(), repo: document.getElementById('cfg-repo').value.trim(), path: document.getElementById('cfg-path').value.trim() };
        localStorage.setItem('vault_config', JSON.stringify(cfg));
        document.getElementById('modal-config').classList.remove('open');
        showToast("✓ Guardado"); syncAll();
    }

    if (e.target.id === 'copy-pos-modal') { navigator.clipboard.writeText(document.getElementById('inp-pos').value); showToast("📋 Copiado"); }
    if (e.target.id === 'copy-neg-modal') { navigator.clipboard.writeText(document.getElementById('inp-neg').value); showToast("📋 Copiado"); }
    
    if (e.target.id === 'btn-save') {
        const id = document.getElementById('edit-id').value || 'p' + Date.now();
        const entry = { id, titulo: document.getElementById('inp-titulo').value, categoria: document.getElementById('inp-cat').value, tags: document.getElementById('inp-tags').value, promptPos: document.getElementById('inp-pos').value, promptNeg: document.getElementById('inp-neg').value, notas: document.getElementById('inp-notas').value, imgUrl: document.getElementById('inp-img').value, link: document.getElementById('inp-link').value, linkLabel: document.getElementById('inp-link-label').value, modelo: document.getElementById('inp-model').value, fav: items.find(x=>x.id===id)?.fav || false };
        const idx = items.findIndex(x => x.id === id);
        if(idx > -1) items[idx] = entry; else items.unshift(entry);
        localStorage.setItem('vault_data', JSON.stringify(items)); notifyPanel(); renderAll(); 
        document.getElementById('modal-edit').classList.remove('open'); await pushToGH();
    }

    if (e.target.id === 'btn-delete' && confirm("¿Borrar?")) {
        items = items.filter(x => x.id !== document.getElementById('edit-id').value);
        localStorage.setItem('vault_data', JSON.stringify(items)); notifyPanel(); renderAll();
        document.getElementById('modal-edit').classList.remove('open'); await pushToGH();
    }

    if (e.target.classList.contains('close-trigger') || e.target.classList.contains('modal-overlay')) { 
        document.querySelectorAll('.modal-overlay').forEach(m => m.classList.remove('open')); 
    }
    if (e.target.id === 'btn-clear-tag') { document.getElementById('tag-badge').style.display = 'none'; renderGrid(); }
});

function openModal(id = null) {
    document.getElementById('modal-edit').classList.add('open');
    if (id) {
        const i = items.find(x => x.id === id);
        document.getElementById('edit-id').value = id;
        document.getElementById('inp-titulo').value = i.titulo;
        document.getElementById('inp-cat').value = i.categoria;
        document.getElementById('inp-tags').value = i.tags;
        document.getElementById('inp-pos').value = i.promptPos;
        document.getElementById('inp-neg').value = i.promptNeg;
        document.getElementById('inp-notas').value = i.notas;
        document.getElementById('inp-img').value = i.imgUrl;
        document.getElementById('inp-link').value = i.link;
        document.getElementById('inp-link-label').value = i.linkLabel;
        document.getElementById('inp-model').value = i.modelo;
        document.getElementById('prev-img').src = i.imgUrl;
        document.getElementById('btn-delete').style.display = 'block';
    } else {
        document.getElementById('edit-id').value = '';
        document.querySelectorAll('#modal-edit input, #modal-edit textarea').forEach(el => el.value = '');
        document.getElementById('prev-img').src = '';
        document.getElementById('btn-delete').style.display = 'none';
    }
}

function toggleFav(id, e) {
    e.stopPropagation();
    const idx = items.findIndex(x => x.id === id);
    if(idx > -1) { items[idx].fav = !items[idx].fav; localStorage.setItem('vault_data', JSON.stringify(items)); notifyPanel(); renderGrid(); pushToGH(); }
}

function setSearch(t) { document.getElementById('tag-text').innerText = t; document.getElementById('tag-badge').style.display = 'flex'; renderGrid(); }

function openToolsGrid(category) {
    document.getElementById('tools-grid-title').innerText = category;
    const catTools = tools.filter(t => t.category === category);
    document.getElementById('tools-container').innerHTML = catTools.map(t => `
        <div class="tool-card" onclick="window.open('${t.url}', '_blank')">
            <img src="https://www.google.com/s2/favicons?domain=${new URL(t.url).origin}&sz=64">
            <span>${t.name}</span>
        </div>`).join('');
    document.getElementById('modal-tools-grid').classList.add('open');
}

// Lógica de pesos Stable Diffusion
document.querySelectorAll('.prompt-area').forEach(area => {
    area.onmouseup = (e) => {
        const sel = area.value.substring(area.selectionStart, area.selectionEnd).trim();
        if (sel.length > 0) {
            selectionData = { text: sel, start: area.selectionStart, end: area.selectionEnd, targetId: area.id };
            const mm = document.getElementById('weight-modal');
            mm.style.display = 'flex'; mm.style.left = (e.pageX + 10) + 'px'; mm.style.top = (e.pageY - 60) + 'px';
        } else { document.getElementById('weight-modal').style.display = 'none'; }
    };
});

document.getElementById('btn-apply-weight').onclick = () => {
    const w = document.getElementById('weight-input').value;
    const area = document.getElementById(selectionData.targetId);
    area.value = area.value.substring(0, selectionData.start) + `(${selectionData.text}:${w})` + area.value.substring(selectionData.end);
    document.getElementById('weight-modal').style.display = 'none';
};

document.getElementById('btn-undo-weight').onclick = () => {
    const area = document.getElementById(selectionData.targetId);
    const t = selectionData.text;
    if (t.startsWith('(') && t.endsWith(')')) {
        const clean = t.replace(/^\(|\)$/g, '').split(':')[0];
        area.value = area.value.substring(0, selectionData.start) + clean + area.value.substring(selectionData.end);
    }
    document.getElementById('weight-modal').style.display = 'none';
};

document.getElementById('inp-img').oninput = (e) => document.getElementById('prev-img').src = e.target.value;
document.getElementById('search-input').oninput = () => renderGrid();
function openConfig() { const cfg = getConfig(); document.getElementById('cfg-token').value = cfg.token; document.getElementById('cfg-repo').value = cfg.repo; document.getElementById('cfg-path').value = cfg.path; document.getElementById('modal-config').classList.add('open'); }
function setGlobalFilter(f) { currentFilter = f; document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active')); event.target.classList.add('active'); renderGrid(); }

syncAll();
</script>
</body>
</html>
