<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Prompt Vault Pro | Responsive</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#07070d; --surface:#0f0f1a; --surface2:#141424; --border:#1e1e36; 
  --cyan:#22d3ee; --purple:#a78bfa; --red:#f87171; --text:#ddddf5; --muted:#55557a;
  --gold:#fbbf24; --r:10px; --font-mono: 'Space Mono', monospace;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--text); font-family: var(--font-mono); display: flex; height: 100vh; overflow: hidden; }

/* --- SIDEBAR RESPONSIVO --- */
aside { 
    width: 260px; background: var(--surface); border-right: 1px solid var(--border); 
    display: flex; flex-direction: column; flex-shrink: 0; transition: transform 0.3s ease;
    z-index: 2000;
}
.nav-label { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin: 15px 15px 8px; display: block; }
.nav-item { padding: 8px 15px; cursor: pointer; font-size: 12px; display: flex; justify-content: space-between; align-items: center; transition: 0.2s; }
.nav-item.active { background: rgba(34,211,238,0.1); color: var(--cyan); }
.tag-cloud { padding: 8px 15px; display: flex; flex-wrap: wrap; gap: 4px; }
.tag-btn { font-size: 9px; background: var(--surface2); border: 1px solid var(--border); color: var(--muted); padding: 2px 6px; border-radius: 4px; cursor: pointer; }

/* --- MAIN --- */
main { flex: 1; display: flex; flex-direction: column; background: var(--bg); position: relative; min-width: 0; }
.top-bar { padding: 10px 15px; border-bottom: 1px solid var(--border); display: flex; gap: 10px; align-items: center; background: rgba(7,7,13,0.8); backdrop-filter: blur(10px); }
.search-input { flex: 1; background: var(--surface); border: 1px solid var(--border); color: white; padding: 8px 12px; border-radius: 6px; outline: none; font-size: 13px; min-width: 50px; }
.btn-primary { background: var(--cyan); color: #000; border: none; padding: 8px 12px; border-radius: 6px; font-weight: 700; cursor: pointer; font-family: inherit; font-size: 11px; white-space: nowrap; }

/* MENU HAMBURGUESA */
#menu-toggle { display: none; background: none; border: none; color: var(--cyan); font-size: 20px; cursor: pointer; padding: 5px; }

/* --- GRID --- */
.grid { flex: 1; overflow-y: auto; padding: 12px; display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 12px; }
.card { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; overflow: hidden; display: flex; flex-direction: column; position: relative; }
.card-img { width: 100%; height: 110px; object-fit: cover; cursor: pointer; }
.fav-btn-card { position: absolute; top: 6px; right: 6px; background: rgba(0,0,0,0.6); border: 1px solid rgba(255,255,255,0.1); color: #444; border-radius: 50%; width: 26px; height: 26px; display: flex; align-items: center; justify-content: center; cursor: pointer; z-index: 5; font-size: 14px; }
.fav-btn-card.active { color: var(--gold); border-color: var(--gold); }
.card-content { padding: 8px; flex: 1; cursor: pointer; }
.card-info-row { display: flex; justify-content: space-between; align-items: center; margin-top: 4px; font-size: 8px; }
.card-actions { display: grid; grid-template-columns: 1fr 1fr; border-top: 1px solid var(--border); }
.card-btn { background: var(--surface2); border: none; color: var(--text); padding: 8px; font-size: 9px; cursor: pointer; font-weight: 700; }

/* --- MODAL RESPONSIVO --- */
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.9); backdrop-filter: blur(8px); display: none; align-items: center; justify-content: center; z-index: 3000; padding: 15px; }
.modal { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; width: 100%; max-width: 850px; max-height: 90vh; overflow-y: auto; display: grid; grid-template-columns: 280px 1fr; }
textarea { width: 100%; background: var(--surface2); border: 1px solid var(--border); color: white; padding: 8px; border-radius: 4px; font-family: inherit; resize: vertical !important; min-height: 60px; }

/* --- MEDIA QUERIES --- */
@media (max-width: 768px) {
    aside { position: fixed; height: 100%; transform: translateX(-100%); }
    aside.open { transform: translateX(0); }
    #menu-toggle { display: block; }
    .modal { grid-template-columns: 1fr; }
    .modal-aside { border-right: none !important; border-bottom: 1px solid var(--border); }
    .grid { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); padding: 8px; gap: 8px; }
    .card-img { height: 90px; }
    .top-bar { padding: 8px; }
}

#weight-modal { position: absolute; background: #1a1a2e; border: 1px solid var(--cyan); border-radius: 6px; padding: 6px; z-index: 4000; display: none; flex-direction: column; gap: 4px; width: 120px; }
#weight-modal input { background: #050508; border: 1px solid var(--border); color: white; padding: 4px; font-size: 10px; width: 100%; text-align: center; }
#weight-modal button { background: var(--cyan); color: #000; border: none; font-size: 9px; padding: 4px; cursor: pointer; font-weight: 700; }
#toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: var(--cyan); color: #000; padding: 8px 16px; border-radius: 6px; font-weight: 700; display: none; z-index: 5000; font-size: 11px; }
</style>
</head>
<body>

<aside id="sidebar">
    <div style="padding: 15px 20px; font-family: 'Syne'; font-weight: 800; color: var(--cyan); font-size: 13px; display: flex; justify-content: space-between; align-items: center;">
        ⬡ PROMPT VAULT
        <button id="close-menu" style="display:none; background:none; border:none; color:var(--muted); font-size:18px;">✕</button>
    </div>
    <div style="flex: 1; overflow-y: auto;">
        <span class="nav-label">Biblioteca</span>
        <div class="nav-item active" onclick="setFilter('all')">🏠 Todos</div>
        <div class="nav-item" onclick="setFilter('fav')">⭐ Favoritos</div>
        <span class="nav-label">Carpetas</span>
        <div id="sidebar-folders"></div>
        <span class="nav-label">Hashtags</span>
        <div id="sidebar-tags" class="tag-cloud"></div>
    </div>
</aside>

<main>
    <div class="top-bar">
        <button id="menu-toggle">☰</button>
        <input type="text" id="search-input" class="search-input" placeholder="Buscar..." oninput="renderGrid()">
        <button class="btn-primary" onclick="openModal()">+ NUEVO</button>
        <button onclick="openConfig()" style="background:none; border:1px solid var(--border); color:var(--muted); padding:6px; border-radius:6px; cursor:pointer;">⚙</button>
    </div>
    <div id="main-grid" class="grid"></div>
</main>

<div id="weight-modal">
    <input type="text" id="weight-input" value="1.2">
    <div style="display:flex; gap:3px">
        <button onclick="applyWeight()" style="flex:2">APLICAR</button>
        <button onclick="undoWeight()" style="flex:1; background:var(--red); color:white">UNDO</button>
    </div>
</div>

<div class="modal-overlay" id="modal-edit">
    <div class="modal">
        <div class="modal-aside" style="padding:15px; border-right:1px solid var(--border); background:rgba(0,0,0,0.1)">
            <img id="prev-img" src="" style="width:100%; aspect-ratio:1; object-fit:cover; border-radius:6px; margin-bottom:12px; background:#000; border:1px solid var(--border)">
            <label style="font-size:8px; color:var(--muted)">IMAGEN URL</label>
            <input type="text" id="inp-img" style="width:100%; margin-bottom:8px; background:var(--surface2); border:1px solid var(--border); color:white; padding:6px; border-radius:4px; font-size:10px" oninput="updateImgPreview(this.value)">
            <label style="font-size:8px; color:var(--muted)">LINK ORIGEN</label>
            <input type="text" id="inp-link" style="width:100%; margin-bottom:8px; background:var(--surface2); border:1px solid var(--border); color:white; padding:6px; border-radius:4px; font-size:10px">
            <label style="font-size:8px; color:var(--muted)">ETIQUETA LINK</label>
            <input type="text" id="inp-link-label" style="width:100%; margin-bottom:8px; background:var(--surface2); border:1px solid var(--border); color:white; padding:6px; border-radius:4px; font-size:10px">
            <label style="font-size:8px; color:var(--muted)">MODELO IA</label>
            <input type="text" id="inp-model" style="width:100%; background:var(--surface2); border:1px solid var(--border); color:white; padding:6px; border-radius:4px; font-size:10px">
        </div>
        <div class="modal-main" style="padding:15px">
            <input type="hidden" id="edit-id">
            <label style="font-size:8px; color:var(--muted)">TÍTULO</label>
            <input type="text" id="inp-titulo" style="width:100%; margin-bottom:8px; background:var(--surface2); border:1px solid var(--border); color:white; padding:8px; border-radius:4px; font-weight:700">
            <div style="display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-bottom:8px">
                <div><label style="font-size:8px; color:var(--muted)">CATEGORÍA</label><input type="text" id="inp-cat" style="width:100%; background:var(--surface2); border:1px solid var(--border); color:white; padding:6px; border-radius:4px;"></div>
                <div><label style="font-size:8px; color:var(--muted)">TAGS</label><input type="text" id="inp-tags" style="width:100%; background:var(--surface2); border:1px solid var(--border); color:white; padding:6px; border-radius:4px;"></div>
            </div>
            <label style="font-size:8px; color:var(--muted)">POSITIVO <span onclick="copyFromInput('inp-pos', 'Positivo')" style="color:var(--cyan); cursor:pointer; float:right">COPIAR</span></label>
            <textarea id="inp-pos" rows="4" onmouseup="handleSelection(event, 'inp-pos')"></textarea>
            <label style="font-size:8px; color:var(--muted); margin-top:8px; display:block">NEGATIVO <span onclick="copyFromInput('inp-neg', 'Negativo')" style="color:var(--cyan); cursor:pointer; float:right">COPIAR</span></label>
            <textarea id="inp-neg" rows="2" onmouseup="handleSelection(event, 'inp-neg')"></textarea>
            <label style="font-size:8px; color:var(--muted); margin-top:8px; display:block">NOTAS</label>
            <textarea id="inp-notas" rows="2"></textarea>
            <div style="display:flex; gap:8px; margin-top:12px">
                <button class="btn-primary" style="flex:1" onclick="saveEntry()">💾 GUARDAR</button>
                <button id="btn-delete" style="color:var(--red); border:1px solid var(--red); background:none; padding:8px; border-radius:6px; cursor:pointer" onclick="deleteCurrent()">🗑</button>
                <button onclick="closeModal()" style="padding:8px; border-radius:6px; background:none; border:1px solid var(--border); color:var(--muted); cursor:pointer; font-size:11px">Cerrar</button>
            </div>
        </div>
    </div>
</div>

<div class="modal-overlay" id="modal-config"><div class="modal" style="display:block; padding:15px; max-width:350px"><h3>Config GitHub</h3><br><input type="password" id="cfg-token" placeholder="Token" style="width:100%; margin-bottom:8px; padding:8px"><input type="text" id="cfg-repo" placeholder="user/repo" style="width:100%; margin-bottom:8px; padding:8px"><input type="text" id="cfg-path" placeholder="path.json" style="width:100%; margin-bottom:8px; padding:8px"><button class="btn-primary" style="width:100%" onclick="saveConfig()">GUARDAR</button></div></div>
<div id="toast"></div>

<script>
// --- CORE DATA & STATE ---
let items = JSON.parse(localStorage.getItem('vault_data')) || [];
let currentFilter = 'all';
let selectionData = { text: '', start: 0, end: 0, targetId: '' };

const getConfig = () => JSON.parse(localStorage.getItem('vault_config')) || { token: '', repo: '', path: '' };

// --- RESPONSIVE MENU ---
document.getElementById('menu-toggle').onclick = () => {
    document.getElementById('sidebar').classList.add('open');
    document.getElementById('close-menu').style.display = 'block';
};
document.getElementById('close-menu').onclick = () => {
    document.getElementById('sidebar').classList.remove('open');
};

// --- STABLE DIFFUSION WEIGHTS ---
function handleSelection(e, targetId) {
    const area = document.getElementById(targetId);
    const sel = area.value.substring(area.selectionStart, area.selectionEnd).trim();
    if (sel.length > 0) {
        selectionData = { text: sel, start: area.selectionStart, end: area.selectionEnd, targetId };
        const mm = document.getElementById('weight-modal');
        mm.style.display = 'flex';
        // Ajuste de posición para móviles
        let x = e.pageX + 10;
        if (x + 130 > window.innerWidth) x = window.innerWidth - 140;
        mm.style.left = x + 'px';
        mm.style.top = (e.pageY - 60) + 'px';
    } else { document.getElementById('weight-modal').style.display = 'none'; }
}
function applyWeight() {
    const w = document.getElementById('weight-input').value;
    const area = document.getElementById(selectionData.targetId);
    let t = selectionData.text;
    if (t.startsWith('(') && t.endsWith(')')) t = t.replace(/^\(|\)$/g, '').split(':')[0];
    area.value = area.value.substring(0, selectionData.start) + `(${t}:${w})` + area.value.substring(selectionData.end);
    document.getElementById('weight-modal').style.display = 'none';
}
function undoWeight() {
    const area = document.getElementById(selectionData.targetId);
    let t = selectionData.text.replace(/^\(+|\)+$/g, '').split(':')[0];
    area.value = area.value.substring(0, selectionData.start) + t + area.value.substring(selectionData.end);
    document.getElementById('weight-modal').style.display = 'none';
}

// --- SYNC & RENDERING ---
function showToast(m) { const t = document.getElementById('toast'); t.innerText = m; t.style.display = 'block'; setTimeout(() => t.style.display='none', 2000); }
async function toggleFavorite(id) {
    const idx = items.findIndex(x => x.id === id);
    if (idx > -1) {
        items[idx].fav = !items[idx].fav;
        localStorage.setItem('vault_data', JSON.stringify(items));
        renderAll(); await pushToGH();
    }
}
function getLinkLabel(i) {
    if (i.linkLabel) return i.linkLabel;
    try { return new URL(i.link).hostname.replace('www.', '').substring(0, 10); } catch(e) { return "Link"; }
}

function renderGrid() {
    const q = document.getElementById('search-input').value.toLowerCase();
    const grid = document.getElementById('main-grid');
    const filtered = items.filter(i => {
        const m = (i.titulo||'').toLowerCase().includes(q) || (i.tags||'').toLowerCase().includes(q) || (i.categoria||'').toLowerCase().includes(q);
        if (currentFilter === 'fav') return i.fav && m;
        if (currentFilter !== 'all') return i.categoria === currentFilter && m;
        return m;
    });
    grid.innerHTML = filtered.map(i => `
        <div class="card">
            <button class="fav-btn-card ${i.fav ? 'active' : ''}" onclick="event.stopPropagation(); toggleFavorite('${i.id}')">★</button>
            <img src="${i.imgUrl || 'https://via.placeholder.com/400x180?text=No+Image'}" class="card-img" onclick="openModal('${i.id}')">
            <div class="card-content" onclick="openModal('${i.id}')">
                <div style="font-weight:700; font-size:10px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;">${i.titulo || 'Sin título'}</div>
                <div class="card-info-row">
                    <span class="card-cat">${(i.categoria||'Gral').substring(0,8)}</span>
                    ${i.link ? `<a href="${i.link}" target="_blank" style="color:var(--cyan); text-decoration:none;" onclick="event.stopPropagation()">${getLinkLabel(i)}↗</a>` : ''}
                </div>
            </div>
            <div class="card-actions">
                <button class="card-btn" onclick="event.stopPropagation(); copyVal(\`${(i.promptPos||'').replace(/`/g, '\\`').replace(/\$/g, '\\$')}\`, 'Positivo')">📋 POS</button>
                <button class="card-btn neg" style="border-left:1px solid var(--border)" onclick="event.stopPropagation(); copyVal(\`${(i.promptNeg||'').replace(/`/g, '\\`').replace(/\$/g, '\\$')}\`, 'Negativo')">📋 NEG</button>
            </div>
        </div>`).join('');
}

function renderSidebar() {
    const folders = [...new Set(items.map(i => i.categoria).filter(Boolean))];
    document.getElementById('sidebar-folders').innerHTML = folders.map(f => `<div class="nav-item ${currentFilter===f?'active':''}" onclick="setFilter('${f}')">📁 ${f}</div>`).join('');
    const tags = [...new Set(items.flatMap(i => (i.tags||'').split(' ').filter(t => t.startsWith('#'))))];
    document.getElementById('sidebar-tags').innerHTML = tags.map(t => `<button class="tag-btn" onclick="setSearch('${t}')">${t}</button>`).join('');
}

async function syncAll() {
    renderAll();
    const cfg = getConfig(); if (!cfg.token) return;
    try {
        const url = `https://api.github.com/repos/${cfg.repo}/contents/${cfg.path}`;
        const res = await fetch(url, { headers: { 'Authorization': `token ${cfg.token}`, 'Cache-Control': 'no-cache' } });
        if (res.ok) {
            const data = await res.json();
            items = JSON.parse(decodeURIComponent(escape(atob(data.content))));
            localStorage.setItem('vault_data', JSON.stringify(items)); renderAll();
        }
    } catch(e) {}
}

async function pushToGH() {
    const cfg = getConfig(); if (!cfg.token) return;
    const url = `https://api.github.com/repos/${cfg.repo}/contents/${cfg.path}`;
    try {
        const gr = await fetch(url, { headers: { 'Authorization': `token ${cfg.token}` } });
        let sha = gr.ok ? (await gr.json()).sha : "";
        const content = btoa(unescape(encodeURIComponent(JSON.stringify(items, null, 2))));
        await fetch(url, { method: 'PUT', headers: { 'Authorization': `token ${cfg.token}` }, body: JSON.stringify({ message: "Update", content, sha }) });
        showToast("✓ Sincronizado");
    } catch(e) {}
}

function openModal(id = null) {
    document.getElementById('modal-edit').style.display = 'flex';
    if (id) {
        const i = items.find(x => x.id === id);
        document.getElementById('edit-id').value = id;
        document.getElementById('inp-titulo').value = i.titulo || '';
        document.getElementById('inp-cat').value = i.categoria || '';
        document.getElementById('inp-tags').value = i.tags || '';
        document.getElementById('inp-pos').value = i.promptPos || '';
        document.getElementById('inp-neg').value = i.promptNeg || '';
        document.getElementById('inp-notas').value = i.notas || '';
        document.getElementById('inp-img').value = i.imgUrl || '';
        document.getElementById('inp-link').value = i.link || '';
        document.getElementById('inp-link-label').value = i.linkLabel || '';
        document.getElementById('inp-model').value = i.modelo || '';
        updateImgPreview(i.imgUrl);
    } else {
        document.getElementById('edit-id').value = '';
        document.querySelectorAll('#modal-edit input, #modal-edit textarea').forEach(e => e.value = '');
        updateImgPreview('');
    }
}
async function saveEntry() {
    const id = document.getElementById('edit-id').value || 'p' + Date.now();
    const e = { id, titulo: document.getElementById('inp-titulo').value, categoria: document.getElementById('inp-cat').value, tags: document.getElementById('inp-tags').value, promptPos: document.getElementById('inp-pos').value, promptNeg: document.getElementById('inp-neg').value, notas: document.getElementById('inp-notas').value, imgUrl: document.getElementById('inp-img').value, link: document.getElementById('inp-link').value, linkLabel: document.getElementById('inp-link-label').value, modelo: document.getElementById('inp-model').value, fav: items.find(x=>x.id===id)?.fav||false };
    const idx = items.findIndex(x => x.id === id);
    if(idx > -1) items[idx] = e; else items.unshift(e);
    localStorage.setItem('vault_data', JSON.stringify(items));
    renderAll(); closeModal(); await pushToGH();
}

function renderAll() { renderGrid(); renderSidebar(); }
function setFilter(f) { 
    currentFilter = f; 
    if(window.innerWidth <= 768) document.getElementById('sidebar').classList.remove('open');
    renderAll(); 
}
function setSearch(t) { document.getElementById('search-input').value = t; renderGrid(); }
function closeModal() { document.querySelectorAll('.modal-overlay').forEach(m => m.style.display = 'none'); }
function copyVal(val, msg) { navigator.clipboard.writeText(val); showToast(msg); }
function updateImgPreview(url) { document.getElementById('prev-img').src = url || 'https://via.placeholder.com/300?text=No+Image'; }
function openConfig() { document.getElementById('modal-config').style.display = 'flex'; }
function saveConfig() { const cfg = { token: document.getElementById('cfg-token').value, repo: document.getElementById('cfg-repo').value, path: document.getElementById('cfg-path').value }; localStorage.setItem('vault_config', JSON.stringify(cfg)); closeModal(); syncAll(); }
async function deleteCurrent() { const id = document.getElementById('edit-id').value; if(!id || !confirm("¿Eliminar?")) return; items = items.filter(x => x.id !== id); localStorage.setItem('vault_data', JSON.stringify(items)); renderAll(); closeModal(); await pushToGH(); }

syncAll();
</script>
</body>
</html>
