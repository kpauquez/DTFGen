<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prompt Vault Panel - Vivaldi</title>
    <style>
        :root { --primary: #22d3ee; --bg: #0f172a; --card: #1e293b; --text: #ffffff; --accent: #8b5cf6; --border: #334155; --red: #f87171; --green: #4ade80; }
        body { font-family: sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

        /* ── ICON BAR ── */
        #icon-bar { display: flex; flex-direction: row; align-items: center; justify-content: space-around; background: #080f1e; border-top: 1px solid var(--border); padding: 8px; gap: 2px; flex-shrink: 0; position: sticky; bottom: 0; z-index: 3000; }
        .cat-icon-btn { position: relative; width: 36px; height: 36px; border-radius: 8px; border: 1px solid transparent; background: transparent; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 17px; transition: 0.15s; color: var(--text); padding: 0; flex-shrink: 0; }
        .cat-icon-btn:hover { background: rgba(34,211,238,0.12); border-color: var(--primary); }
        .cat-icon-btn .tip { display: none; position: absolute; bottom: calc(100% + 8px); left: 50%; transform: translateX(-50%); background: #1e293b; border: 1px solid var(--primary); color: var(--primary); font-size: 10px; font-weight: bold; white-space: nowrap; padding: 4px 9px; border-radius: 6px; pointer-events: none; z-index: 9999; letter-spacing: 0.5px; }
        .cat-icon-btn:hover .tip { display: block; }
        #icon-bar .sep { width: 1px; height: 24px; background: var(--border); margin: 0 2px; flex-shrink: 0; }

        /* ── CONTENT AREA ── */
        #content-area { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        .view { display: none; flex-direction: column; height: 100%; padding: 15px; box-sizing: border-box; overflow-y: auto; }
        .view.active { display: flex; }
        label { display: block; font-size: 0.7rem; color: var(--primary); margin-bottom: 2px; font-weight: bold; margin-top: 8px; text-transform: uppercase; }
        input, textarea { width: 100%; background: #1e293b; color: white; border: 1px solid var(--border); border-radius: 6px; padding: 10px; box-sizing: border-box; font-size: 14px; outline: none; font-family: inherit; }
        textarea { resize: vertical; min-height: 60px; }
        
        .copy-wrapper { position: relative; display: flex; gap: 5px; align-items: flex-start; }
        .btn-copy-small { background: var(--accent); color: white; border: none; border-radius: 4px; padding: 8px; cursor: pointer; font-size: 12px; transition: 0.2s; flex-shrink: 0; }
        .btn-copy-small:hover { filter: brightness(1.2); }

        .preview-box { width: 100%; height: 150px; background: #000; border-radius: 8px; border: 1px dashed var(--border); overflow: hidden; display: flex; align-items: center; justify-content: center; margin-bottom: 5px; }
        .preview-box img { max-width: 100%; max-height: 100%; object-fit: cover; }
        .btn-row { display: flex; gap: 8px; margin-top: 15px; }
        .btn { flex: 1; padding: 12px; border-radius: 6px; border: none; font-weight: bold; cursor: pointer; font-family: inherit; }
        .btn-save { background: var(--primary); color: #000; }
        .btn-cancel { background: var(--border); color: white; }
        .btn-delete { background: transparent; color: var(--red); border: 1px solid var(--red); }
        
        .card-mini { background: var(--card); border-radius: 8px; padding: 8px; margin-bottom: 10px; border: 1px solid var(--border); cursor: pointer; transition: 0.2s; position: relative; }
        .card-mini:hover { border-color: var(--primary); }
        .card-mini img { width: 100%; height: 80px; object-fit: cover; border-radius: 4px; }
        .card-info-badges { display: flex; gap: 4px; margin-top: 4px; flex-wrap: wrap; }
        .badge { font-size: 9px; padding: 2px 5px; border-radius: 3px; background: #0f172a; border: 1px solid var(--border); color: var(--accent); font-weight: bold; }
        
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); backdrop-filter: blur(4px); display: none; align-items: center; justify-content: center; z-index: 2000; padding: 15px; padding-bottom: 70px; }
        .modal-overlay.open { display: flex; }
        .modal { background: var(--bg); border: 1px solid var(--border); border-radius: 12px; width: 100%; max-height: 85vh; overflow-y: auto; padding: 20px; position: relative; }
        
        .bottom-control-bar { position: sticky; bottom: 0; background: var(--card); padding: 10px; border-top: 1px solid var(--primary); display: flex; gap: 10px; align-items: center; z-index: 100; box-sizing: border-box; }
        .btn-add-bottom { background: var(--primary); color: #000; width: 45px; height: 45px; border-radius: 50%; border: none; font-size: 28px; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; padding: 0; line-height: 1; box-shadow: 0 2px 8px rgba(34,211,238,0.3); }
        .search-area { margin-top: 20px; border-top: 1px solid var(--border); padding-top: 15px; display: flex; gap: 5px; margin-bottom: 15px; }

        /* ── MINI MODAL PESOS ── */
        #weight-popover { position: fixed; background: var(--card); border: 1px solid var(--primary); border-radius: 8px; padding: 6px; display: none; flex-direction: row; gap: 6px; z-index: 5000; box-shadow: 0 4px 15px rgba(0,0,0,0.5); align-items: center; }
        #weight-input { width: 50px; padding: 4px; font-size: 12px; height: 28px; text-align: center; background: #080f1e; }
        .weight-btn { background: var(--primary); color: #000; border: none; padding: 4px 8px; border-radius: 4px; cursor: pointer; font-size: 11px; font-weight: bold; height: 28px; transition: 0.2s; }
        .btn-undo-weight { background: var(--red); color: white; }

        /* Tools Panel */
        #tools-panel-header { display: flex; align-items: center; justify-content: space-between; padding: 14px 16px; border-bottom: 1px solid var(--border); background: #080f1e; }
        #tools-panel-title { font-size: 14px; font-weight: bold; color: var(--primary); }
        #tools-panel-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; padding: 14px; max-height: 60vh; overflow-y: auto; }
        .panel-tool-card { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 12px 8px; display: flex; flex-direction: column; align-items: center; gap: 7px; cursor: pointer; text-decoration: none; transition: 0.15s; }
        .panel-tool-card:hover { border-color: var(--primary); background: rgba(34,211,238,0.07); transform: translateY(-1px); }
        .panel-tool-card img { width: 32px; height: 32px; border-radius: 6px; }
        .panel-tool-card span { font-size: 10px; font-weight: bold; color: var(--text); text-align: center; line-height: 1.3; word-break: break-word; }
    </style>
</head>
<body>

    <div id="content-area">
        <div id="view-new" class="view active">
            <h3 style="margin:0; color:var(--primary)">Captura Rápida</h3>
            <div class="preview-box"><img id="prev-img" src="" onerror="this.src='https://via.placeholder.com/300x150?text=Vista+Previa'"></div>
            <label>URL Imagen</label>
            <input type="text" id="inp-img" placeholder="URL..." oninput="document.getElementById('prev-img').src=this.value">
            <label>Título</label>
            <input type="text" id="inp-titulo">
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
                <div><label>Categoría</label><input type="text" id="inp-cat" placeholder="Ej: Anime, Realismo..."></div>
                <div><label>Modelo IA</label><input type="text" id="inp-model" placeholder="Ej: SD 1.5, Flux..."></div>
            </div>
            <label>Link Origen</label>
            <input type="text" id="inp-link" placeholder="https://civitai.com/...">
            <label>Prompt Positivo</label><textarea id="inp-pos"></textarea>
            <label>Prompt Negativo</label><textarea id="inp-neg"></textarea>
            <label>Hashtags</label><input type="text" id="inp-tags" placeholder="#tshirt #vector #dtf">
            <label>Notas</label><textarea id="inp-notas" rows="2"></textarea>
            <div class="btn-row">
                <button class="btn btn-cancel" onclick="clearForm()">Limpiar</button>
                <button class="btn btn-save" onclick="handleSave()">Guardar Prompt</button>
            </div>
            <div class="search-area">
                <input type="text" id="main-search" placeholder="Buscar en biblioteca...">
                <button class="btn btn-save" style="flex:0; padding:10px;" onclick="showResults()">🔍</button>
            </div>
        </div>

        <div id="view-results" class="view">
            <h3 style="margin:0; color:var(--primary)">Resultados</h3>
            <div id="list-container" style="flex:1; margin-top:15px; display: grid; grid-template-columns: 1fr 1fr; gap: 10px;"></div>
            <div class="bottom-control-bar">
                <button class="btn-add-bottom" onclick="showNew()">+</button>
                <input type="text" id="res-search" placeholder="Filtrar por tags o título..." oninput="filterList(this.value)">
                <button class="btn btn-cancel" style="flex:0; width: 40px;" onclick="showNew()">✕</button>
            </div>
        </div>
    </div>

    <div id="icon-bar">
        <button class="cat-icon-btn" onclick="openToolsPanel('💡 INSPIRA')">💡<span class="tip">INSPIRA</span></button>
        <button class="cat-icon-btn" onclick="openToolsPanel('🤖 IAS')">🤖<span class="tip">IAS</span></button>
        <button class="cat-icon-btn" onclick="openToolsPanel('🖼️ IMG-TO-TXT')">🖼️<span class="tip">IMG-TO-TXT</span></button>
        <button class="cat-icon-btn" onclick="openToolsPanel('🚀 EXPANDIR IA')">🚀<span class="tip">EXPANDIR IA</span></button>
        <button class="cat-icon-btn" onclick="openToolsPanel('🎨 IMG GEN')">🎨<span class="tip">IMG GEN</span></button>
        <button class="cat-icon-btn" onclick="openToolsPanel('🔍 UPSCALERS')">🔍<span class="tip">UPSCALERS</span></button>
        <div class="sep"></div>
        <button class="cat-icon-btn" onclick="openToolsPanel('📂 REPOSITORIOS')">📂<span class="tip">REPOSITORIOS</span></button>
        <button class="cat-icon-btn" onclick="openToolsPanel('📖 ENCICLOPEDIA')">📖<span class="tip">ENCICLOPEDIA</span></button>
    </div>

    <div class="modal-overlay" id="modal-edit">
        <div class="modal">
            <h3 style="color:var(--primary); margin-top:0;">Editar Prompt</h3>
            <input type="hidden" id="edit-id">
            <div class="preview-box" style="height: 120px;"><img id="edit-prev-img" src=""></div>
            
            <label>Título</label><input type="text" id="edit-titulo">
            
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
                <div><label>Categoría</label><input type="text" id="edit-cat"></div>
                <div><label>Modelo IA</label><input type="text" id="edit-model"></div>
            </div>

            <label>Link Origen</label><input type="text" id="edit-link">

            <label>Prompt Positivo</label>
            <div class="copy-wrapper">
                <textarea id="edit-pos" rows="4"></textarea>
                <button class="btn-copy-small" onclick="copyText('edit-pos')" title="Copiar Positivo">📋</button>
            </div>

            <label>Prompt Negativo</label>
            <div class="copy-wrapper">
                <textarea id="edit-neg" rows="2"></textarea>
                <button class="btn-copy-small" onclick="copyText('edit-neg')" title="Copiar Negativo">📋</button>
            </div>

            <label>Hashtags</label><input type="text" id="edit-tags">
            <label>Notas</label><textarea id="edit-notas" rows="2"></textarea>

            <div class="btn-row">
                <button class="btn btn-save" onclick="saveEdit()">Actualizar</button>
                <button class="btn btn-delete" onclick="deleteItem()">Eliminar</button>
            </div>
            <button class="btn btn-cancel" style="width:100%; margin-top:10px;" onclick="closeModal()">Cerrar</button>
        </div>
    </div>

    <div id="weight-popover">
        <span style="font-size: 10px; color: var(--primary); font-weight: bold;">:</span>
        <input type="text" id="weight-input" placeholder="1.2" value="1.2">
        <button class="weight-btn" onclick="applyWeight()">Aplicar</button>
        <button class="weight-btn btn-undo-weight" onclick="undoWeight()">⟲</button>
    </div>

    <div class="modal-overlay" id="modal-tools-panel"><div class="modal"><div id="tools-panel-header"><span id="tools-panel-title"></span><button onclick="document.getElementById('modal-tools-panel').classList.remove('open')" style="background:none; border:none; color:var(--text); font-size:18px; cursor:pointer;">×</button></div><div id="tools-panel-grid"></div></div></div>

    <div id="confirm-overlay" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.85); align-items:center; justify-content:center; z-index:4000; padding:20px;">
        <div style="background:#1e293b; border:1px solid #f87171; border-radius:12px; padding:24px; width:100%; max-width:280px; text-align:center;">
            <p style="color:#fff; margin-bottom:20px;">¿Eliminar permanentemente?</p>
            <div style="display:flex; gap:10px;">
                <button id="confirm-yes" style="flex:1; background:#f87171; border:none; padding:12px; border-radius:6px; cursor:pointer;">Eliminar</button>
                <button id="confirm-no" style="flex:1; background:#334155; color:#fff; border:none; padding:12px; border-radius:6px; cursor:pointer;">Cancelar</button>
            </div>
        </div>
    </div>

    <script>
        let items = [];
        let tools = [];
        let lastSelection = { start: 0, end: 0, text: '', targetId: '' };
        const vaultChannel = new BroadcastChannel('vault_sync');

        vaultChannel.onmessage = (e) => {
            if (e.data?.type === 'vault_updated') {
                items = e.data.items || items;
                tools = e.data.tools || tools;
                localStorage.setItem('vault_data', JSON.stringify(items));
                if (document.getElementById('view-results').classList.contains('active')) filterList(document.getElementById('res-search').value);
            }
        };

        function notifyIndex() { vaultChannel.postMessage({ type: 'vault_updated', items, tools }); }

        function loadLocal() {
            try {
                items = JSON.parse(localStorage.getItem('vault_data')) || [];
                tools = JSON.parse(localStorage.getItem('vault_tools')) || [];
            } catch (e) { items = []; tools = []; }
        }

        function saveLocal() {
            localStorage.setItem('vault_data', JSON.stringify(items));
            notifyIndex();
        }

        function copyText(id) {
            const txt = document.getElementById(id).value;
            navigator.clipboard.writeText(txt);
            showToastPanel("Copiado al portapapeles");
        }

        // --- LÓGICA DE PESOS ---
        document.addEventListener('mouseup', (e) => {
            const popover = document.getElementById('weight-popover');
            const activeEl = document.activeElement;
            const validIds = ['edit-pos', 'edit-neg', 'inp-pos', 'inp-neg'];
            if (validIds.includes(activeEl.id)) {
                const selectedText = activeEl.value.substring(activeEl.selectionStart, activeEl.selectionEnd);
                if (selectedText.trim().length > 0) {
                    lastSelection = { start: activeEl.selectionStart, end: activeEl.selectionEnd, text: selectedText.trim(), targetId: activeEl.id };
                    popover.style.left = `${Math.min(e.clientX, window.innerWidth - 150)}px`;
                    popover.style.top = `${e.clientY - 50}px`;
                    popover.style.display = 'flex';
                } else { popover.style.display = 'none'; }
            } else if (!popover.contains(e.target)) { popover.style.display = 'none'; }
        });

        function applyWeight() {
            const el = document.getElementById(lastSelection.targetId);
            const weight = document.getElementById('weight-input').value || "1.2";
            const newText = `(${lastSelection.text}:${weight})`;
            el.value = el.value.substring(0, lastSelection.start) + newText + el.value.substring(lastSelection.end);
            document.getElementById('weight-popover').style.display = 'none';
        }

        function undoWeight() {
            const el = document.getElementById(lastSelection.targetId);
            const match = lastSelection.text.match(/^\((.*):[0-9.]+\)$/);
            if (match) {
                el.value = el.value.substring(0, lastSelection.start) + match[1] + el.value.substring(lastSelection.end);
            }
            document.getElementById('weight-popover').style.display = 'none';
        }

        // --- FUNCIONES CORE ---
        function filterList(val) {
            const container = document.getElementById('list-container');
            const query = (val || '').toLowerCase();
            const filtered = items.filter(i => 
                (i.titulo || '').toLowerCase().includes(query) || 
                (i.tags || '').toLowerCase().includes(query) ||
                (i.categoria || '').toLowerCase().includes(query)
            );
            container.innerHTML = filtered.map(i => `
                <div class="card-mini" onclick="openEdit('${i.id}')">
                    <img src="${i.imgUrl || 'https://via.placeholder.com/150x80'}" onerror="this.src='https://via.placeholder.com/150x80'">
                    <div style="font-size:11px; font-weight:bold; margin-top:5px; color:var(--primary); white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">${i.titulo}</div>
                    <div class="card-info-badges">
                        ${i.categoria ? `<span class="badge">${i.categoria}</span>` : ''}
                        ${i.modelo ? `<span class="badge" style="color:var(--primary)">${i.modelo}</span>` : ''}
                    </div>
                </div>`).join('');
        }

        function openEdit(id) {
            const item = items.find(i => i.id === id);
            if (!item) return;
            document.getElementById('edit-id').value = item.id;
            document.getElementById('edit-titulo').value = item.titulo || '';
            document.getElementById('edit-cat').value = item.categoria || '';
            document.getElementById('edit-model').value = item.modelo || '';
            document.getElementById('edit-link').value = item.link || '';
            document.getElementById('edit-pos').value = item.promptPos || '';
            document.getElementById('edit-neg').value = item.promptNeg || '';
            document.getElementById('edit-tags').value = item.tags || '';
            document.getElementById('edit-notas').value = item.notas || '';
            document.getElementById('edit-prev-img').src = item.imgUrl || '';
            document.getElementById('modal-edit').classList.add('open');
        }

        async function saveEdit() {
            const id = document.getElementById('edit-id').value;
            const idx = items.findIndex(i => i.id === id);
            if (idx > -1) {
                items[idx] = { ...items[idx],
                    titulo: document.getElementById('edit-titulo').value,
                    categoria: document.getElementById('edit-cat').value,
                    modelo: document.getElementById('edit-model').value,
                    link: document.getElementById('edit-link').value,
                    promptPos: document.getElementById('edit-pos').value,
                    promptNeg: document.getElementById('edit-neg').value,
                    tags: document.getElementById('edit-tags').value,
                    notas: document.getElementById('edit-notas').value
                };
                saveLocal();
                filterList(document.getElementById('res-search').value);
                closeModal();
            }
        }

        async function handleSave() {
            loadLocal();
            const entry = {
                id: 'p' + Date.now(),
                titulo: document.getElementById('inp-titulo').value || 'Sin título',
                promptPos: document.getElementById('inp-pos').value,
                promptNeg: document.getElementById('inp-neg').value,
                imgUrl: document.getElementById('inp-img').value,
                categoria: document.getElementById('inp-cat').value || 'Gral',
                modelo: document.getElementById('inp-model').value || '',
                link: document.getElementById('inp-link').value || '',
                tags: document.getElementById('inp-tags').value,
                notas: document.getElementById('inp-notas').value
            };
            items.unshift(entry);
            saveLocal();
            clearForm();
            showToastPanel("✓ Prompt Guardado");
        }

        function openToolsPanel(category) {
            loadLocal();
            document.getElementById('tools-panel-title').innerText = category;
            const catTools = tools.filter(t => t.category === category);
            const grid = document.getElementById('tools-panel-grid');
            if (catTools.length === 0) {
                grid.innerHTML = `<div style="grid-column:1/-1; text-align:center; color:var(--accent); padding:20px; font-size:13px;">Sin tools en esta categoría.</div>`;
            } else {
                grid.innerHTML = catTools.map(t => {
                    let favicon = '';
                    try { favicon = `https://www.google.com/s2/favicons?domain=${new URL(t.url).origin}&sz=64`; } catch(e) { favicon = 'https://via.placeholder.com/32'; }
                    return `<a class="panel-tool-card" href="${t.url}" target="_blank">
                        <img src="${favicon}" onerror="this.src='https://via.placeholder.com/32?text=🔗'">
                        <span>${t.name}</span>
                    </a>`;
                }).join('');
            }
            document.getElementById('modal-tools-panel').classList.add('open');
        }

        // Helpers UI
        function showResults() { loadLocal(); showView('view-results'); filterList(document.getElementById('main-search').value); }
        function showNew() { showView('view-new'); }
        function showView(id) { document.querySelectorAll('.view').forEach(v => v.classList.remove('active')); document.getElementById(id).classList.add('active'); }
        function closeModal() { document.getElementById('modal-edit').classList.remove('open'); }
        function clearForm() { document.querySelectorAll('#view-new input, #view-new textarea').forEach(i => i.value = ''); document.getElementById('prev-img').src = ''; }
        function showToastPanel(msg) {
            let t = document.getElementById('panel-toast') || document.createElement('div');
            t.id = 'panel-toast';
            t.style.cssText = 'position:fixed;bottom:70px;left:50%;transform:translateX(-50%);background:var(--green);color:#000;padding:8px 15px;border-radius:20px;font-weight:bold;z-index:6000;font-size:12px;box-shadow:0 4px 10px rgba(0,0,0,0.3)';
            t.innerText = msg; document.body.appendChild(t); t.style.display = 'block';
            setTimeout(() => t.style.display = 'none', 2000);
        }

        document.getElementById('confirm-yes').onclick = () => {
            const id = document.getElementById('confirm-overlay').dataset.targetId;
            items = items.filter(i => i.id !== id);
            saveLocal(); filterList(''); document.getElementById('confirm-overlay').style.display = 'none'; closeModal();
        };
        function deleteItem() {
            document.getElementById('confirm-overlay').style.display = 'flex';
            document.getElementById('confirm-overlay').dataset.targetId = document.getElementById('edit-id').value;
        }
        document.getElementById('confirm-no').onclick = () => document.getElementById('confirm-overlay').style.display = 'none';

        loadLocal();
    </script>
</body>
</html>
