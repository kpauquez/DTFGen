<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Prompt Vault Pro | AI Cloud Center</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<style>
    
:root {
  --bg:#07070d; --surface:#0f0f1a; --surface2:#1a1a2e; --border:#2a2a48; 
  --cyan:#22d3ee; --purple:#c4b5fd; --red:#f87171; --text:#ffffff; --muted:#a1a1aa;
  --gold:#fbbf24; --r:10px; --font-mono: 'Space Mono', monospace;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html { overflow-x: hidden; }
body { background: var(--bg); color: var(--text); font-family: var(--font-mono); display: flex; flex-direction: column; height: 100vh; overflow: hidden; max-width: 100vw; }

/* --- MAIN --- */
main { flex: 1; display: flex; flex-direction: column; background: var(--bg); position: relative; min-width: 0; overflow: hidden; }

/* --- BOTTOM BAR --- */
#bottom-bar { 
    flex-shrink: 0;
    background: var(--surface); 
    border-top: 1px solid var(--border); 
    display: flex; 
    flex-direction: column;
    z-index: 2000;
    padding: 8px 12px 10px;
    gap: 8px;
}
.search-container { display: flex; align-items: center; background: var(--bg); border: 1px solid var(--border); border-radius: 6px; padding: 2px 10px; gap: 8px; }
.search-input { flex: 1; background: none; border: none; color: white; padding: 8px 0; outline: none; font-size: 14px; width: 100%; }
#tag-badge { display: none; align-items: center; background: rgba(34,211,238,0.1); border: 1px solid var(--cyan); color: var(--cyan); padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 700; gap: 6px; }

/* --- ICON TOOL BAR --- */
#tool-icon-bar { display: flex; align-items: center; justify-content: space-around; gap: 4px; }
.tool-icon-btn { 
    position: relative; 
    background: var(--surface2); 
    border: 1px solid var(--border); 
    border-radius: 8px; 
    width: 38px; height: 38px; 
    display: flex; align-items: center; justify-content: center; 
    font-size: 18px; cursor: pointer; 
    transition: 0.15s; 
    flex: 1;
    max-width: 52px;
}
.tool-icon-btn:hover { border-color: var(--cyan); background: rgba(34,211,238,0.1); }
.tool-icon-btn .tip { 
    display: none; 
    position: absolute; 
    bottom: calc(100% + 8px); 
    left: 50%; 
    transform: translateX(-50%); 
    background: var(--surface2); 
    border: 1px solid var(--cyan); 
    color: var(--cyan); 
    font-size: 9px; 
    font-weight: 700; 
    white-space: nowrap; 
    padding: 3px 8px; 
    border-radius: 5px; 
    pointer-events: none; 
    z-index: 9999;
    letter-spacing: 0.5px;
}
.tool-icon-btn:hover .tip { display: block; }
#tool-icon-bar .sep { width: 1px; height: 24px; background: var(--border); flex-shrink: 0; }

/* btn nuevo prompt flotante */
#btn-new-float {
    position: fixed; bottom: 115px; right: 18px;
    background: var(--cyan); color: #000;
    border: none; border-radius: 50%;
    width: 48px; height: 48px;
    font-size: 26px; font-weight: 700;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; z-index: 2500;
    box-shadow: 0 4px 15px rgba(34,211,238,0.4);
    transition: 0.2s; line-height: 1;
}
#btn-new-float:hover { transform: scale(1.1); }

.btn-primary { background: var(--cyan); color: #000; border: none; padding: 10px 18px; border-radius: 6px; font-weight: 700; cursor: pointer; font-family: inherit; font-size: 12px; }

/* --- GRID --- */
.grid { 
    flex: 1; 
    overflow-y: auto; 
    padding: 20px; 
    display: grid; 
    grid-template-columns: repeat(auto-fill, minmax(250px, 250px)); 
    gap: 12px; 
    align-content: start;
}

/* --- CARD COMPACTA --- */
.card { 
    background: var(--surface); 
    border: 1px solid var(--border); 
    border-radius: 8px; 
    overflow: hidden; 
    display: flex; 
    flex-direction: column; 
    position: relative; 
    width: 250px;
    height: 260px;
    transition: 0.2s; 
}
.card:hover { border-color: var(--cyan); }
.card-img { width: 100%; height: 140px; object-fit: cover; background: #000; cursor: pointer; flex-shrink: 0; }
.card-model { position: absolute; top: 110px; right: 8px; background: rgba(7, 7, 13, 0.8); backdrop-filter: blur(4px); color: var(--cyan); border: 1px solid var(--cyan); padding: 2px 8px; border-radius: 4px; font-size: 10px; font-weight: 700; z-index: 15; }
.card-link-label { position: absolute; top: 110px; left: 8px; background: rgba(7, 7, 13, 0.8); backdrop-filter: blur(4px); color: var(--cyan); border: 1px solid var(--cyan); padding: 2px 8px; border-radius: 4px; font-size: 10px; font-weight: 700; z-index: 15; text-decoration: none; transition: 0.2s; }
.card-link-label:hover { background: var(--cyan); color: #000; }
.card-content { padding: 10px 12px; flex: 1; cursor: pointer; display: flex; flex-direction: column; }
.card-title { font-weight: 700; font-size: 14px; color: var(--text); margin-bottom: 5px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.card-info-row { display: flex; justify-content: space-between; align-items: center; font-size: 10px; margin-bottom: 6px; line-height: 1.2; }
.card-cat { color: var(--purple); font-weight: 700; }
.card-tags { display: flex; flex-wrap: nowrap; gap: 4px; margin-top: 4px; padding-top: 0; overflow-x: auto; scrollbar-width: none; }
.card-tags::-webkit-scrollbar { display: none; }
.card-hashtag { font-size: 9px; color: var(--muted); background: rgba(255, 255, 255, 0.05); padding: 2px 6px; border-radius: 4px; cursor: pointer; }

/* --- BOTONES --- */
.card-actions { display: flex; border-top: 1px solid var(--border); flex-shrink: 0; }
.card-btn { flex: 1; background: var(--surface2); border: none; color: var(--text); padding: 10px 5px; font-size: 10px; cursor: pointer; font-weight: 700; font-family: inherit; }
.card-btn:first-child { border-right: 1px solid var(--border); }
.card-btn:hover { background: var(--cyan); color: #000; }
.fav-btn-card { position: absolute; top: 8px; right: 8px; background: rgba(0,0,0,0.6); border: 1px solid rgba(255,255,255,0.1); color: #444; border-radius: 50%; width: 28px; height: 28px; display: flex; align-items: center; justify-content: center; cursor: pointer; z-index: 10; font-size: 14px; }
.fav-btn-card.active { color: var(--gold); border-color: var(--gold); }

/* --- MODALES --- */
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.9); backdrop-filter: blur(8px); display: none; align-items: center; justify-content: center; z-index: 3000; padding: 20px; }
.modal-overlay.open { display: flex; }
.modal { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; width: 100%; max-width: 850px; max-height: 90vh; overflow-y: auto; display: grid; grid-template-columns: 280px 1fr; position: relative; }

@media (max-width: 768px) {
    .modal { grid-template-columns: 1fr; }
    .modal-aside { border-right: none !important; border-bottom: 1px solid var(--border); }
    .grid { grid-template-columns: repeat(2, 1fr) !important; gap: 10px; padding: 10px; align-content: start; overflow-x: hidden; }
    .card { width: 100% !important; max-width: 100%; height: 170px; min-height: unset; overflow: hidden; }
    main { overflow-x: hidden; max-width: 100vw; }
    .card-img { height: 100px; }
    .card-model { top: 75px; }
    .card-link-label { top: 75px; }
    .card-content { padding: 6px 8px; }
    .card-actions { display: none; }
    .card-title { font-size: 11px; margin-bottom: 3px; }
    .card-info-row { font-size: 9px; margin-bottom: 4px; }
    .card-hashtag { font-size: 8px; padding: 2px 5px; }
    .card-btn { font-size: 9px; padding: 8px 4px; }
    #btn-new-float { bottom: 125px; }
}

.modal label { font-size: 11px; color: var(--cyan); margin-bottom: 6px; display: block; font-weight: 700; text-transform: uppercase; }
.modal input, .modal textarea { width: 100%; font-size: 13px; color: var(--text); background: var(--bg); border: 1px solid var(--border); padding: 10px; border-radius: 6px; margin-bottom: 15px; font-family: inherit; outline: none; }

/* --- TOOLS GRID STYLE --- */
.tools-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 10px; padding: 14px; }
.tool-card { background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; padding: 14px 8px 10px; display: flex; flex-direction: column; align-items: center; text-align: center; gap: 7px; transition: 0.2s; cursor: pointer; position: relative; aspect-ratio: 1; justify-content: center; }
.tool-card:hover { border-color: var(--cyan); transform: translateY(-2px); }
.tool-card img { width: 34px; height: 34px; border-radius: 8px; }
.tool-card span { font-size: 10px; font-weight: 700; color: var(--text); overflow: hidden; text-overflow: ellipsis; width: 100%; white-space: nowrap; }
.tool-card-actions { position: absolute; top: 5px; right: 5px; display: flex; gap: 3px; opacity: 0; transition: 0.2s; }
.tool-card:hover .tool-card-actions { opacity: 1; }
.tool-mini-btn { background: rgba(15,15,26,0.85); border: 1px solid var(--border); color: var(--text); padding: 4px 5px; border-radius: 5px; cursor: pointer; font-size: 10px; line-height: 1; transition: 0.15s; backdrop-filter: blur(4px); }
.tool-mini-btn:hover { border-color: var(--cyan); color: var(--cyan); }
.tool-mini-btn.del:hover { border-color: var(--red); color: var(--red); }

/* --- CARPETAS --- */
.modal-folder-section { border-bottom: 1px solid var(--border); }
.modal-folder-header { display: flex; align-items: center; gap: 10px; padding: 11px 16px; cursor: pointer; user-select: none; transition: 0.15s; }
.modal-folder-header:hover { background: rgba(255,255,255,0.04); }
.modal-folder-arrow { font-size: 9px; color: var(--muted); transition: transform 0.2s; flex-shrink: 0; width: 12px; }
.modal-folder-section.open .modal-folder-arrow { transform: rotate(90deg); }
.modal-folder-label { font-size: 13px; font-weight: 700; color: var(--text); flex: 1; }
.modal-folder-count { font-size: 10px; color: var(--muted); flex-shrink: 0; }
.modal-folder-actions { display: flex; gap: 6px; opacity: 0; transition: 0.15s; flex-shrink: 0; }
.modal-folder-header:hover .modal-folder-actions { opacity: 1; }
.mf-btn { display: flex; align-items: center; justify-content: center; width: 32px; height: 32px; padding: 0; font-size: 14px; background: rgba(15,15,26,0.9); border: 1px solid var(--border); color: var(--muted); border-radius: 5px; cursor: pointer; transition: 0.15s; }
.mf-btn:hover { border-color: var(--cyan); color: var(--cyan); }
.mf-btn.del:hover { border-color: var(--red); color: var(--red); }
.modal-folder-body { display: none; }
.modal-folder-section.open .modal-folder-body { display: block; }

#btn-new-folder-grid, #btn-add-tool-from-grid { display: flex; align-items: center; justify-content: center; width: 38px; height: 38px; padding: 0; font-size: 18px; }

/* Form inline carpeta */
.inline-folder-form { background: rgba(0,0,0,0.35); border: 1px solid var(--border); border-radius: 8px; margin: 0 16px 16px; padding: 14px; display: none; }
.inline-folder-form.open { display: block; }
.inline-folder-form .form-row { display: flex; gap: 8px; align-items: stretch; margin-bottom: 10px; }
.inline-folder-form input { background: var(--bg); border: 1px solid var(--border); color: var(--text); padding: 8px 10px; border-radius: 5px; font-family: inherit; font-size: 13px; outline: none; margin-bottom: 0; }
.inline-folder-form .emoji-inp { width: 54px; text-align: center; font-size: 18px; flex-shrink: 0; }
.inline-folder-form .name-inp { flex: 1; text-transform: uppercase; }
.root-section-label { padding: 10px 16px 4px; font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; font-weight: 700; border-top: 1px solid var(--border); }

#weight-modal { position: absolute; background: #1a1a2e; border: 1px solid var(--cyan); border-radius: 6px; padding: 8px; z-index: 4000; display: none; flex-direction: column; gap: 5px; width: 130px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
#weight-modal input { background: #050508; border: 1px solid var(--border); color: white; padding: 4px; font-size: 10px; width: 100%; text-align: center; margin-bottom: 0; }
#weight-modal button { border: none; font-size: 9px; padding: 6px; cursor: pointer; font-weight: 700; border-radius: 4px; transition: 0.2s; }
#btn-apply-weight { background: var(--cyan); color: #000; }
#btn-undo-weight { background: #333; color: var(--red); border: 1px solid var(--red) !important; }
#toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: var(--cyan); color: #000; padding: 12px 24px; border-radius: 8px; font-weight: 700; display: none; z-index: 5000; font-size: 13px; }
</style>
</head>
<body>

<main>
    <div id="main-grid" class="grid"></div>
</main>

<div id="bottom-bar">
    <div class="search-container">
        <div id="tag-badge">
            <span id="tag-text"></span>
            <span style="cursor:pointer" id="btn-clear-tag">×</span>
        </div>
        <input type="text" id="search-input" class="search-input" placeholder="Buscar en la bóveda...">
        <button id="btn-config" style="background:none; border:none; color:var(--cyan); cursor:pointer; font-size:16px; padding:4px;">⚙</button>
    </div>
    <div id="tool-icon-bar">
        <button class="tool-icon-btn" onclick="openToolsModal('💡 INSPIRA')">💡<span class="tip">INSPIRA</span></button>
        <button class="tool-icon-btn" onclick="openToolsModal('🤖 IAS')">🤖<span class="tip">IAS</span></button>
        <button class="tool-icon-btn" onclick="openToolsModal('🖼️ IMG-TO-TXT')">🖼️<span class="tip">IMG-TO-TXT</span></button>
        <button class="tool-icon-btn" onclick="openToolsModal('🚀 EXPANDIR IA')">🚀<span class="tip">EXPANDIR IA</span></button>
        <button class="tool-icon-btn" onclick="openToolsModal('🎨 IMG GEN')">🎨<span class="tip">IMG GEN</span></button>
        <button class="tool-icon-btn" onclick="openToolsModal('🔍 UPSCALERS')">🔍<span class="tip">UPSCALERS</span></button>
        <div class="sep"></div>
        <button class="tool-icon-btn" onclick="openToolsModal('📂 REPOSITORIOS')">📂<span class="tip">REPOSITORIOS</span></button>
        <button class="tool-icon-btn" onclick="openToolsModal('📖 ENCICLOPEDIA')">📖<span class="tip">ENCICLOPEDIA</span></button>
    </div>
</div>

<button id="btn-new-float" onclick="openModal()">+</button>

<div class="modal-overlay" id="modal-edit">
    <div class="modal">
        <div class="modal-aside" style="padding:20px; border-right:1px solid var(--border); background:rgba(0,0,0,0.2)">
            <img id="prev-img" src="" style="width:100%; aspect-ratio:1; object-fit:cover; border-radius:8px; margin-bottom:15px; background:#000;">
            <label>Imagen URL</label><input type="text" id="inp-img">
            <label>Link Origen</label><input type="text" id="inp-link">
            <label>Etiqueta Link</label><input type="text" id="inp-link-label" placeholder="Ej: CivitAI">
            <label>Modelo IA</label><input type="text" id="inp-model">
        </div>
        <div class="modal-main" style="padding:20px">
            <input type="hidden" id="edit-id">
            <label>Título</label><input type="text" id="inp-titulo">
            <div style="display:grid; grid-template-columns:1fr 1fr; gap:15px">
                <div><label>Categoría</label><input type="text" id="inp-cat"></div>
                <div><label>Tags (#tag)</label><input type="text" id="inp-tags"></div>
            </div>
            <label>Positivo <span id="copy-pos-modal" style="cursor:pointer; color:var(--cyan); font-size:10px;">COPIAR</span></label>
            <textarea id="inp-pos" rows="4" class="prompt-area" style="resize:vertical"></textarea>
            <label>Negativo <span id="copy-neg-modal" style="cursor:pointer; color:var(--cyan); font-size:10px;">COPIAR</span></label>
            <textarea id="inp-neg" rows="2" class="prompt-area" style="resize:vertical"></textarea>
            <label>Notas</label><textarea id="inp-notas" rows="2" style="resize:vertical"></textarea>
            <div style="display:flex; gap:10px">
                <button class="btn-primary" style="flex:1" id="btn-save">💾 GUARDAR</button>
                <button id="btn-delete" style="color:var(--red); border:1px solid var(--red); background:none; padding:10px; border-radius:6px; cursor:pointer">🗑</button>
                <button class="close-trigger" style="padding:10px; border-radius:6px; background:none; border:1px solid var(--border); color:var(--muted); cursor:pointer">Cerrar</button>
            </div>
        </div>
    </div>
</div>

<div class="modal-overlay" id="modal-config">
    <div class="modal" style="display:block; padding:20px; max-width:400px">
        <label>Token GitHub</label><input type="password" id="cfg-token">
        <label>Repo (user/repo)</label><input type="text" id="cfg-repo">
        <label>Path JSON</label><input type="text" id="cfg-path">
        <button class="btn-primary" style="width:100%" id="btn-save-config">GUARDAR CONFIG</button>
        <button class="close-trigger" style="width:100%; margin-top:10px; background:none; border:none; color:var(--muted); cursor:pointer">Cerrar</button>
    </div>
</div>

<div class="modal-overlay" id="modal-tools-grid">
    <div class="modal" style="display:block; max-width:740px; padding:0; overflow:hidden;">
        <div style="padding:15px 20px; border-bottom:1px solid var(--border); display:flex; justify-content:space-between; align-items:center; gap:10px; background:rgba(0,0,0,0.25); position:sticky; top:0; z-index:10;">
            <div>
                <h2 id="tools-grid-title" style="font-family:'Syne'; color:var(--cyan); font-size:17px;"></h2>
                <p id="tools-grid-sub" style="font-size:10px; color:var(--muted); margin-top:2px;"></p>
            </div>
            <div style="display:flex; gap:8px; align-items:center;">
                <button id="btn-new-folder-grid" title="Nueva carpeta"
                    style="background:rgba(196,181,253,0.12); color:var(--purple); border:1px solid rgba(196,181,253,0.4); border-radius:7px; cursor:pointer;">📁</button>
                <button id="btn-add-tool-from-grid" title="Nuevo marcador"
                    style="background:var(--cyan); color:#000; border:none; border-radius:7px; cursor:pointer;">🔖</button>
                <button class="close-trigger" style="background:none; border:none; color:var(--muted); cursor:pointer; font-size:24px; margin-left:5px;">×</button>
            </div>
        </div>

        <div class="inline-folder-form" id="inline-folder-form">
            <div style="font-size:10px; font-weight:700; color:var(--purple); text-transform:uppercase; letter-spacing:1px; margin-bottom:10px;" id="inline-folder-title">📁 Nueva Carpeta</div>
            <input type="hidden" id="edit-folder-id">
            <div class="form-row">
                <input type="text" class="emoji-inp" id="edit-folder-emoji" placeholder="📁" maxlength="4">
                <input type="text" class="name-inp" id="edit-folder-name" placeholder="Nombre">
            </div>
            <div style="display:flex; gap:8px; margin-top:10px;">
                <button class="btn-primary" style="font-size:11px; padding:8px 14px;" id="btn-save-folder">GUARDAR</button>
                <button id="btn-cancel-folder" style="background:none; border:none; color:var(--muted); cursor:pointer; font-size:12px;">Cancelar</button>
            </div>
        </div>

        <div id="tools-modal-body" style="overflow-y:auto; max-height:calc(90vh - 130px);"></div>
    </div>
</div>

<div class="modal-overlay" id="modal-tool-form">
    <div class="modal" style="display:block; padding:22px; max-width:420px">
        <h3 id="tool-form-title" style="margin-bottom:16px; font-size:14px; color:var(--cyan); letter-spacing:1px;">NUEVO MARCADOR</h3>
        <input type="hidden" id="tool-id">
        <input type="hidden" id="tool-category">
        <label>Nombre</label><input type="text" id="tool-name" placeholder="Ej: Pinterest">
        <label>URL</label><input type="text" id="tool-url" placeholder="https://...">
        <label>Carpeta</label>
        <select id="tool-folder-select" style="width:100%; font-size:13px; color:var(--text); background:var(--bg); border:1px solid var(--border); padding:10px; border-radius:6px; margin-bottom:18px; font-family:inherit; outline:none;"></select>
        <div style="display:flex; gap:10px">
            <button class="btn-primary" style="flex:1" id="btn-save-tool">GUARDAR</button>
            <button class="close-trigger" style="background:none; border:none; color:var(--muted); cursor:pointer">Cancelar</button>
        </div>
    </div>
</div>

<div id="weight-modal">
    <input type="text" id="weight-input" value="1.2">
    <div style="display:flex; gap:4px">
        <button id="btn-apply-weight" style="flex:2">APLICAR</button>
        <button id="btn-undo-weight" style="flex:1.5">UNDO</button>
    </div>
</div>
<div id="toast"></div>

<script>
let items = []; let tools = []; let currentFilter = 'all'; let currentCategory = '';
let selectionData = { text: '', start: 0, end: 0, targetId: '' };

// GESTIÓN DE DATOS
const getConfig = () => JSON.parse(localStorage.getItem('vault_config')) || { token: '', repo: '', path: '' };
const showToast = (m) => { const t = document.getElementById('toast'); t.innerText = m; t.style.display = 'block'; setTimeout(() => t.style.display='none', 2000); };
function getFolders() { try { return JSON.parse(localStorage.getItem('vault_folders')) || []; } catch(e) { return []; } }
function saveFolders(f) { localStorage.setItem('vault_folders', JSON.stringify(f)); }

const vaultChannel = new BroadcastChannel('vault_sync');
function notifyPanel() { vaultChannel.postMessage({ type: 'vault_updated', items, tools }); }
vaultChannel.onmessage = (e) => {
    if (e.data && e.data.type === 'vault_updated') {
        items = e.data.items || items; tools = e.data.tools || tools;
        localStorage.setItem('vault_data', JSON.stringify(items)); localStorage.setItem('vault_tools', JSON.stringify(tools));
        renderAll();
    }
};

async function syncAll() {
    try { items = JSON.parse(localStorage.getItem('vault_data')) || []; tools = JSON.parse(localStorage.getItem('vault_tools')) || []; } catch(e) { items = []; tools = []; }
    renderAll();
    const cfg = getConfig(); if (!cfg.token || !cfg.repo) return;
    try {
        const url = `https://api.github.com/repos/${cfg.repo}/contents/${cfg.path}`;
        const res = await fetch(url, { headers: { 'Authorization': `token ${cfg.token}` } });
        if (res.ok) {
            const data = await res.json();
            const cloud = JSON.parse(decodeURIComponent(escape(atob(data.content))));
            if (cloud) {
                if (cloud.prompts) items = cloud.prompts;
                if (cloud.tools) tools = cloud.tools;
                if (cloud.folders) saveFolders(cloud.folders);
            }
            localStorage.setItem('vault_data', JSON.stringify(items)); localStorage.setItem('vault_tools', JSON.stringify(tools));
            notifyPanel(); renderAll();
        }
    } catch(e) { console.error(e); }
}

async function pushToGH() {
    const cfg = getConfig(); if (!cfg.token || !cfg.repo) return;
    const url = `https://api.github.com/repos/${cfg.repo}/contents/${cfg.path}`;
    const payload = { prompts: items, tools, folders: getFolders() };
    try {
        const gr = await fetch(url, { headers: { 'Authorization': `token ${cfg.token}` } });
        let sha = gr.ok ? (await gr.json()).sha : "";
        const content = btoa(unescape(encodeURIComponent(JSON.stringify(payload, null, 2))));
        await fetch(url, { method: 'PUT', headers: { 'Authorization': `token ${cfg.token}` }, body: JSON.stringify({ message: "Update Vault", content, sha }) });
        showToast("✓ Nube actualizada");
    } catch(e) { console.error(e); }
}

// RENDER TOOLS MODAL
function openToolsModal(category) {
    currentCategory = category;
    document.getElementById('tools-grid-title').innerText = category;
    document.getElementById('inline-folder-form').classList.remove('open');
    renderToolsModal();
    document.getElementById('modal-tools-grid').classList.add('open');
}

function renderToolsModal() {
    const cat = currentCategory;
    const folders = getFolders().filter(f => f.categoryLabel === cat);
    const body = document.getElementById('tools-modal-body');
    let html = '';

    if (folders.length === 0 && tools.filter(t => t.category === cat).length === 0) {
        html = `<div style="padding:50px 20px; text-align:center; color:var(--muted); font-size:13px;">Vacío.</div>`;
        body.innerHTML = html; return;
    }

    folders.forEach(f => {
        const folderTools = tools.filter(t => t.category === cat && t.folderId === f.id);
        const isOpen = localStorage.getItem('mf_open_' + f.id) === '1';
        html += `
        <div class="modal-folder-section${isOpen ? ' open' : ''}" id="mf-${f.id}">
            <div class="modal-folder-header" onclick="toggleMFolder('${f.id}')">
                <span class="modal-folder-arrow">▶</span>
                <span class="modal-folder-label">${f.emoji} ${f.name}</span>
                <div class="modal-folder-actions" onclick="event.stopPropagation()">
                    <button class="mf-btn" onclick="openBookmarkForm('${cat.replace(/'/g,"\\'")}', null, '${f.id}')" title="＋ marcador">＋</button>
                    <button class="mf-btn" onclick="openEditFolderForm('${f.id}')" title="✏️ editar">✏️</button>
                    <button class="mf-btn del" onclick="deleteFolder('${f.id}')" title="🗑 borrar">🗑</button>
                </div>
            </div>
            <div class="modal-folder-body">
                ${folderTools.length ? `<div class="tools-grid">${folderTools.map(t => toolCardHTML(t)).join('')}</div>` : `<div style="padding:16px 20px; font-size:11px; color:var(--muted);">Carpeta vacía</div>`}
            </div>
        </div>`;
    });

    const rootTools = tools.filter(t => t.category === cat && !t.folderId);
    if (rootTools.length) {
        html += `<div class="root-section-label">Sin carpeta</div>
                 <div class="tools-grid">${rootTools.map(t => toolCardHTML(t)).join('')}</div>`;
    }
    body.innerHTML = html;
    const total = tools.filter(t => t.category === currentCategory).length;
    document.getElementById('tools-grid-sub').innerText = `${total} marcador${total!==1?'es':''} · ${folders.length} carpeta${folders.length!==1?'s':''}`;
}

function toolCardHTML(t) {
    let fav = ''; try { fav = `https://www.google.com/s2/favicons?domain=${new URL(t.url).origin}&sz=64`; } catch(e) {}
    return `<div class="tool-card" onclick="window.open('${t.url}','_blank')">
        <div class="tool-card-actions">
            <button class="tool-mini-btn" onclick="event.stopPropagation();editTool('${t.id}')">✏️</button>
            <button class="tool-mini-btn del" onclick="event.stopPropagation();deleteTool('${t.id}')">🗑</button>
        </div>
        <img src="${fav}" onerror="this.src='https://via.placeholder.com/40?text=🔗'">
        <span>${t.name}</span>
    </div>`;
}

function toggleMFolder(id) {
    const el = document.getElementById('mf-' + id); if (!el) return;
    el.classList.toggle('open'); localStorage.setItem('mf_open_' + id, el.classList.contains('open') ? '1' : '0');
}

// LOGICA CARPETAS
function openNewFolderForm() {
    document.getElementById('inline-folder-title').innerText = '📁 Nueva Carpeta';
    document.getElementById('edit-folder-id').value = '';
    document.getElementById('edit-folder-emoji').value = '📁';
    document.getElementById('edit-folder-name').value = '';
    document.getElementById('inline-folder-form').classList.add('open');
}
function openEditFolderForm(fid) {
    const f = getFolders().find(x => x.id === fid); if(!f) return;
    document.getElementById('inline-folder-title').innerText = '✏️ Editar Carpeta';
    document.getElementById('edit-folder-id').value = f.id;
    document.getElementById('edit-folder-emoji').value = f.emoji;
    document.getElementById('edit-folder-name').value = f.name;
    document.getElementById('inline-folder-form').classList.add('open');
}
function saveFolder() {
    const eid = document.getElementById('edit-folder-id').value;
    const emo = document.getElementById('edit-folder-emoji').value.trim() || '📁';
    const nam = document.getElementById('edit-folder-name').value.trim().toUpperCase();
    if(!nam) return;
    let folders = getFolders();
    if(eid) { const f = folders.find(x=>x.id===eid); if(f){ f.emoji=emo; f.name=nam; } }
    else { folders.push({ id:'f'+Date.now(), categoryLabel:currentCategory, emoji:emo, name:nam }); }
    saveFolders(folders); document.getElementById('inline-folder-form').classList.remove('open');
    renderToolsModal(); pushToGH();
}
function deleteFolder(fid) {
    if(!confirm('¿Eliminar carpeta?')) return;
    tools = tools.map(t => t.folderId === fid ? {...t, folderId:null} : t);
    saveFolders(getFolders().filter(x=>x.id!==fid));
    localStorage.setItem('vault_tools', JSON.stringify(tools));
    renderToolsModal(); pushToGH();
}

// LOGICA MARCADORES
function openBookmarkForm(cat, tid=null, fid=null) {
    const t = tid ? tools.find(x=>x.id===tid) : null;
    document.getElementById('tool-form-title').innerText = t ? '✏️ EDITAR MARCADOR' : '＋ NUEVO MARCADOR';
    document.getElementById('tool-id').value = t ? t.id : '';
    document.getElementById('tool-category').value = cat || currentCategory;
    document.getElementById('tool-name').value = t ? t.name : '';
    document.getElementById('tool-url').value = t ? t.url : '';
    const folders = getFolders().filter(f => f.categoryLabel === (cat||currentCategory));
    const sel = document.getElementById('tool-folder-select');
    sel.innerHTML = `<option value="">— Sin carpeta —</option>` + folders.map(f=>`<option value="${f.id}">${f.emoji} ${f.name}</option>`).join('');
    sel.value = t ? (t.folderId||'') : (fid||'');
    document.getElementById('modal-tool-form').classList.add('open');
}

function editTool(id) { const t = tools.find(x=>x.id===id); if(t) openBookmarkForm(t.category, id, t.folderId); }
async function deleteTool(id) { if(!confirm('¿Eliminar?')) return; tools=tools.filter(x=>x.id!==id); localStorage.setItem('vault_tools', JSON.stringify(tools)); renderToolsModal(); await pushToGH(); }

// RENDER GRID PRINCIPAL
function renderGrid() {
    const q = document.getElementById('search-input').value.toLowerCase();
    const tagQuery = document.getElementById('tag-badge').style.display === 'flex' ? document.getElementById('tag-text').innerText.toLowerCase() : '';
    const filtered = items.filter(i => {
        const m = (i.titulo||'').toLowerCase().includes(q) || (i.tags||'').toLowerCase().includes(q) || (i.categoria||'').toLowerCase().includes(q);
        const t = tagQuery ? (i.tags || '').toLowerCase().includes(tagQuery) : true;
        return currentFilter === 'fav' ? (i.fav && m && t) : (m && t);
    });
    document.getElementById('main-grid').innerHTML = filtered.map(i => `
        <div class="card" data-id="${i.id}">
            <div class="fav-btn-card ${i.fav ? 'active' : ''}" onclick="toggleFav('${i.id}', event)">★</div>
            <img src="${i.imgUrl || 'https://via.placeholder.com/300x150?text=No+Image'}" class="card-img" onclick="openModal('${i.id}')">
            <span class="card-model">${i.modelo || 'SDXL'}</span> 
            ${i.link ? `<a href="${i.link}" target="_blank" class="card-link-label" onclick="event.stopPropagation()">${i.linkLabel || 'ORIGEN'} ↗</a>` : ''}
            <div class="card-content" onclick="openModal('${i.id}')">
                <div class="card-title">${i.titulo || 'Sin título'}</div>
                <div class="card-info-row"><span class="card-cat">${i.categoria || 'Gral'}</span></div>
                <div class="card-tags">${(i.tags||'').split(' ').filter(t=>t.startsWith('#')).map(t=>`<span class="card-hashtag" onclick="event.stopPropagation(); setSearch('${t}')">${t}</span>`).join('')}</div>
            </div>
        </div>`).join('');
}

function renderAll() { renderGrid(); }

// EVENTOS
document.addEventListener('click', async (e) => {
    const id = e.target.id;
    if (id === 'btn-config') openConfig();
    if (id === 'btn-save-config') {
        const cfg = { token: document.getElementById('cfg-token').value.trim(), repo: document.getElementById('cfg-repo').value.trim(), path: document.getElementById('cfg-path').value.trim() };
        localStorage.setItem('vault_config', JSON.stringify(cfg)); document.getElementById('modal-config').classList.remove('open'); syncAll();
    }
    if (id === 'btn-new-folder-grid') openNewFolderForm();
    if (id === 'btn-add-tool-from-grid') openBookmarkForm(currentCategory);
    if (id === 'btn-save-folder') saveFolder();
    if (id === 'btn-cancel-folder') document.getElementById('inline-folder-form').classList.remove('open');
    if (id === 'btn-save-tool') {
        const tid = document.getElementById('tool-id').value;
        const cat = document.getElementById('tool-category').value;
        const fid = document.getElementById('tool-folder-select').value || null;
        const entry = { id: tid || 't'+Date.now(), name: document.getElementById('tool-name').value.trim(), url: document.getElementById('tool-url').value.trim(), category:cat, folderId:fid };
        if(!entry.url) return;
        const idx = tools.findIndex(x=>x.id===entry.id);
        if(idx>-1) tools[idx]=entry; else tools.push(entry);
        localStorage.setItem('vault_tools', JSON.stringify(tools)); document.getElementById('modal-tool-form').classList.remove('open');
        renderToolsModal(); await pushToGH();
    }
    if (id === 'btn-save') {
        const eid = document.getElementById('edit-id').value || 'p' + Date.now();
        const entry = { id:eid, titulo: document.getElementById('inp-titulo').value, categoria: document.getElementById('inp-cat').value, tags: document.getElementById('inp-tags').value, promptPos: document.getElementById('inp-pos').value, promptNeg: document.getElementById('inp-neg').value, notas: document.getElementById('inp-notas').value, imgUrl: document.getElementById('inp-img').value, link: document.getElementById('inp-link').value, linkLabel: document.getElementById('inp-link-label').value, modelo: document.getElementById('inp-model').value, fav: items.find(x=>x.id===eid)?.fav || false };
        const idx = items.findIndex(x => x.id === eid);
        if(idx > -1) items[idx] = entry; else items.unshift(entry);
        localStorage.setItem('vault_data', JSON.stringify(items)); notifyPanel(); renderAll(); 
        document.getElementById('modal-edit').classList.remove('open'); await pushToGH();
    }
    if (id === 'btn-delete' && confirm("¿Borrar?")) {
        items = items.filter(x => x.id !== document.getElementById('edit-id').value);
        localStorage.setItem('vault_data', JSON.stringify(items)); notifyPanel(); renderAll();
        document.getElementById('modal-edit').classList.remove('open'); await pushToGH();
    }
    if (e.target.classList.contains('close-trigger') || e.target.classList.contains('modal-overlay')) { 
        document.querySelectorAll('.modal-overlay').forEach(m => m.classList.remove('open')); 
    }
    if (id === 'btn-clear-tag') { document.getElementById('tag-badge').style.display = 'none'; renderGrid(); }
});

function openModal(id = null) {
    document.getElementById('modal-edit').classList.add('open');
    if (id) {
        const i = items.find(x => x.id === id);
        document.getElementById('edit-id').value = id;
        document.getElementById('inp-titulo').value = i.titulo;
        document.getElementById('inp-cat').value = i.categoria;
        document.getElementById('inp-tags').value = i.tags;
        document.getElementById('inp-pos').value = i.promptPos;
        document.getElementById('inp-neg').value = i.promptNeg;
        document.getElementById('inp-notas').value = i.notas;
        document.getElementById('inp-img').value = i.imgUrl;
        document.getElementById('inp-link').value = i.link;
        document.getElementById('inp-link-label').value = i.linkLabel;
        document.getElementById('inp-model').value = i.modelo;
        document.getElementById('prev-img').src = i.imgUrl;
        document.getElementById('btn-delete').style.display = 'block';
    } else {
        document.getElementById('edit-id').value = '';
        document.querySelectorAll('#modal-edit input, #modal-edit textarea').forEach(el => el.value = '');
        document.getElementById('prev-img').src = '';
        document.getElementById('btn-delete').style.display = 'none';
    }
}

function toggleFav(id, e) {
    e.stopPropagation();
    const idx = items.findIndex(x => x.id === id);
    if(idx > -1) { items[idx].fav = !items[idx].fav; localStorage.setItem('vault_data', JSON.stringify(items)); notifyPanel(); renderGrid(); pushToGH(); }
}

function setSearch(t) { document.getElementById('tag-text').innerText = t; document.getElementById('tag-badge').style.display = 'flex'; renderGrid(); }

// LÓGICA DE PESOS (WEIGHT)
document.querySelectorAll('.prompt-area').forEach(area => {
    area.onmouseup = (e) => {
        const sel = area.value.substring(area.selectionStart, area.selectionEnd).trim();
        if (sel.length > 0) {
            selectionData = { text: sel, start: area.selectionStart, end: area.selectionEnd, targetId: area.id };
            const mm = document.getElementById('weight-modal');
            mm.style.display = 'flex'; mm.style.left = (e.pageX + 10) + 'px'; mm.style.top = (e.pageY - 60) + 'px';
        } else { document.getElementById('weight-modal').style.display = 'none'; }
    };
});
document.getElementById('btn-apply-weight').onclick = () => {
    const w = document.getElementById('weight-input').value;
    const area = document.getElementById(selectionData.targetId);
    area.value = area.value.substring(0, selectionData.start) + `(${selectionData.text}:${w})` + area.value.substring(selectionData.end);
    document.getElementById('weight-modal').style.display = 'none';
};
document.getElementById('btn-undo-weight').onclick = () => {
    const area = document.getElementById(selectionData.targetId);
    const t = selectionData.text;
    if (t.startsWith('(') && t.endsWith(')')) {
        const clean = t.replace(/^\(|\)$/g, '').split(':')[0];
        area.value = area.value.substring(0, selectionData.start) + clean + area.value.substring(selectionData.end);
    }
    document.getElementById('weight-modal').style.display = 'none';
};

document.getElementById('inp-img').oninput = (e) => document.getElementById('prev-img').src = e.target.value;
document.getElementById('search-input').oninput = () => renderGrid();
function openConfig() { const cfg = getConfig(); document.getElementById('cfg-token').value = cfg.token; document.getElementById('cfg-repo').value = cfg.repo; document.getElementById('cfg-path').value = cfg.path; document.getElementById('modal-config').classList.add('open'); }

syncAll();
</script>
</body>
