<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prompt Vault Panel - Vivaldi</title>
    <style>
        :root { --primary: #22d3ee; --bg: #0f172a; --card: #1e293b; --text: #ffffff; --accent: #8b5cf6; --border: #334155; --red: #f87171; }
        body { font-family: sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

        /* ── NAV BAR FIJA (Abajo) ────────────────────── */
        #global-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: #080f1e;
            border-top: 1px solid var(--border);
            padding: 8px 5px;
            display: flex;
            justify-content: space-around;
            align-items: center;
            z-index: 12000; /* Aumentado para estar por encima de los modales (5000) */
        }
        .cat-icon-btn {
            position: relative;
            width: 38px;
            height: 38px;
            border-radius: 8px;
            border: 1px solid transparent;
            background: transparent;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            transition: 0.15s;
            color: var(--text);
        }
        .cat-icon-btn:hover { background: rgba(34,211,238,0.12); border-color: var(--primary); }
        
        .cat-icon-btn .tip {
            display: none;
            position: absolute;
            bottom: calc(100% + 10px);
            left: 50%;
            transform: translateX(-50%);
            background: var(--card);
            border: 1px solid var(--primary);
            color: var(--primary);
            font-size: 10px;
            font-weight: bold;
            padding: 4px 8px;
            border-radius: 4px;
            white-space: nowrap;
        }
        .cat-icon-btn:hover .tip { display: block; }
        .sep { width: 1px; height: 20px; background: var(--border); }

        /* ── CONTENT AREA ─────────────────────────────── */
        #content-area { 
            flex: 1; 
            display: flex; 
            flex-direction: column; 
            overflow: hidden; 
            margin-bottom: 60px; /* Espacio para la barra fija */
        }

        .view { display: none; flex-direction: column; height: 100%; padding: 15px; box-sizing: border-box; overflow-y: auto; }
        .view.active { display: flex; }
        
        label { display: block; font-size: 0.75rem; color: var(--primary); margin-bottom: 4px; font-weight: bold; margin-top: 10px; text-transform: uppercase; }
        input, textarea { width: 100%; background: #1e293b; color: white; border: 1px solid var(--border); border-radius: 6px; padding: 10px; box-sizing: border-box; font-size: 14px; outline: none; }
        
        .preview-box { width: 100%; height: 140px; background: #000; border-radius: 8px; border: 1px dashed var(--border); overflow: hidden; display: flex; align-items: center; justify-content: center; margin-bottom: 5px; }
        .preview-box img { max-width: 100%; max-height: 100%; object-fit: cover; }
        
        .btn-row { display: flex; gap: 8px; margin-top: 15px; }
        .btn { flex: 1; padding: 12px; border-radius: 6px; border: none; font-weight: bold; cursor: pointer; }
        .btn-save { background: var(--primary); color: #000; }
        .btn-cancel { background: var(--border); color: white; }
        .btn-delete { background: transparent; color: var(--red); border: 1px solid var(--red); }

        /* ── MODALES ──────────────────────────────────── */
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); backdrop-filter: blur(4px); display: none; align-items: center; justify-content: center; z-index: 5000; padding: 15px; padding-bottom: 80px; }
        .modal-overlay.open { display: flex; }
        .modal { background: var(--bg); border: 1px solid var(--border); border-radius: 12px; width: 100%; max-height: 80vh; overflow-y: auto; padding: 20px; }

        .card-mini { background: var(--card); border-radius: 8px; padding: 8px; margin-bottom: 10px; border: 1px solid var(--border); cursor: pointer; }
        .card-mini img { width: 100%; height: 80px; object-fit: cover; border-radius: 4px; }

        #tools-panel-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; padding-top: 15px; }
        .panel-tool-card { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 10px 5px; display: flex; flex-direction: column; align-items: center; gap: 5px; text-decoration: none; }
        .panel-tool-card span { font-size: 9px; color: #fff; font-weight: bold; text-align: center; }
        .panel-tool-card img { width: 24px; height: 24px; border-radius: 4px; }
    </style>
</head>
<body>

    <div id="content-area">
        <div id="view-new" class="view active">
            <h3 style="margin:0; color:var(--primary)">Captura Rápida</h3>
            <div class="preview-box"><img id="prev-img" src="" onerror="this.src='https://via.placeholder.com/300x150?text=Preview'"></div>
            <label>URL Imagen</label>
            <input type="text" id="inp-img" placeholder="URL..." oninput="document.getElementById('prev-img').src=this.value">
            <label>Título</label>
            <input type="text" id="inp-titulo">
            <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
                <div><label>Categoría</label><input type="text" id="inp-cat"></div>
                <div><label>Modelo IA</label><input type="text" id="inp-model"></div>
            </div>
            <label>Prompt Positivo</label><textarea id="inp-pos"></textarea>
            <label>Hashtags</label><input type="text" id="inp-tags">
            <div class="btn-row">
                <button class="btn btn-cancel" onclick="clearForm()">Limpiar</button>
                <button class="btn btn-save" onclick="handleSave()">Guardar</button>
            </div>
            <div style="margin-top:15px; display:flex; gap:5px;">
                <input type="text" id="main-search" placeholder="Buscar en vault...">
                <button class="btn btn-save" style="flex:0; padding:10px;" onclick="showResults()">🔍</button>
            </div>
        </div>

        <div id="view-results" class="view">
            <div style="display:flex; justify-content:space-between; align-items:center;">
                <h3 style="margin:0; color:var(--primary)">Vault</h3>
                <button class="btn btn-cancel" style="padding:5px 12px;" onclick="showNew()">✕</button>
            </div>
            <input type="text" id="res-search" placeholder="Filtrar..." oninput="filterList(this.value)" style="margin-top:10px;">
            <div id="list-container" style="flex:1; margin-top:15px;"></div>
        </div>
    </div>

    <nav id="global-nav">
        <button class="cat-icon-btn" onclick="openToolsPanel('💡 INSPIRA')">💡<span class="tip">INSPIRA</span></button>
        <button class="cat-icon-btn" onclick="openToolsPanel('🤖 IAS')">🤖<span class="tip">IAS</span></button>
        <button class="cat-icon-btn" onclick="openToolsPanel('🚀 EXPANDIR IA')">🚀<span class="tip">EXPANDIR</span></button>
        <button class="cat-icon-btn" onclick="openToolsPanel('🎨 IMG GEN')">🎨<span class="tip">GEN</span></button>
        <div class="sep"></div>
        <button class="cat-icon-btn" onclick="openToolsPanel('📂 REPOSITORIOS')">📂<span class="tip">REPOS</span></button>
        <button class="cat-icon-btn" onclick="showResults()">Search 🔍<span class="tip">VAULT</span></button>
    </nav>

    <div class="modal-overlay" id="modal-edit">
        <div class="modal">
            <h3 style="color:var(--primary); margin-top:0;">Editar Prompt</h3>
            <input type="hidden" id="edit-id">
            <div class="preview-box" style="height: 100px;"><img id="edit-prev-img" src=""></div>
            <label>Título</label><input type="text" id="edit-titulo">
            <label>Prompt</label><textarea id="edit-pos" rows="4"></textarea>
            <div class="btn-row">
                <button class="btn btn-save" onclick="saveEdit()">Actualizar</button>
                <button class="btn btn-delete" onclick="deleteItem()">Borrar</button>
            </div>
            <button class="btn btn-cancel" style="width:100%; margin-top:10px;" onclick="closeModal()">Cerrar</button>
        </div>
    </div>

    <div class="modal-overlay" id="modal-tools-panel">
        <div class="modal">
            <div style="display:flex; justify-content:space-between; align-items:center; border-bottom:1px solid var(--border); padding-bottom:10px;">
                <span id="tools-panel-title" style="font-weight:bold; color:var(--primary);"></span>
                <button onclick="document.getElementById('modal-tools-panel').classList.remove('open')" style="background:none; border:none; color:white; cursor:pointer; font-size:20px;">×</button>
            </div>
            <div id="tools-panel-grid"></div>
        </div>
    </div>

    <div id="confirm-overlay" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.9); align-items:center; justify-content:center; z-index:11000; padding:20px;">
        <div style="background:var(--card); border:1px solid var(--red); border-radius:12px; padding:20px; text-align:center; width:100%;">
            <p>¿Eliminar permanentemente?</p>
            <div style="display:flex; gap:10px; margin-top:15px;">
                <button id="confirm-yes" class="btn btn-delete" style="background:var(--red); color:black;">Sí, borrar</button>
                <button id="confirm-no" class="btn btn-cancel">No</button>
            </div>
        </div>
    </div>

    <script>
        let items = [];
        let tools = [];
        const vaultChannel = new BroadcastChannel('vault_sync');

        vaultChannel.onmessage = (e) => {
            if (e.data?.type === 'vault_updated') {
                items = e.data.items || items;
                tools = e.data.tools || tools;
                if (document.getElementById('view-results').classList.contains('active')) {
                    filterList(document.getElementById('res-search').value);
                }
            }
        };

        function loadLocal() {
            items = JSON.parse(localStorage.getItem('vault_data')) || [];
            tools = JSON.parse(localStorage.getItem('vault_tools')) || [];
        }

        function saveLocal() {
            localStorage.setItem('vault_data', JSON.stringify(items));
            vaultChannel.postMessage({ type: 'vault_updated', items, tools });
        }

        function openToolsPanel(category) {
            loadLocal();
            document.getElementById('tools-panel-title').innerText = category;
            const catTools = tools.filter(t => t.category === category);
            const grid = document.getElementById('tools-panel-grid');
            grid.innerHTML = catTools.length ? catTools.map(t => `
                <a class="panel-tool-card" href="${t.url}" target="_blank">
                    <img src="https://www.google.com/s2/favicons?domain=${new URL(t.url).origin}&sz=64" onerror="this.src='https://via.placeholder.com/32?text=🔗'">
                    <span>${t.name}</span>
                </a>
            `).join('') : '<div style="grid-column:1/-1; opacity:0.5; font-size:12px;">Vacío</div>';
            document.getElementById('modal-tools-panel').classList.add('open');
        }

        function showResults() {
            loadLocal();
            const q = document.getElementById('main-search').value;
            document.getElementById('res-search').value = q;
            document.getElementById('view-new').classList.remove('active');
            document.getElementById('view-results').classList.add('active');
            filterList(q);
        }

        function showNew() {
            document.getElementById('view-results').classList.remove('active');
            document.getElementById('view-new').classList.add('active');
        }

        function filterList(val) {
            const container = document.getElementById('list-container');
            const query = (val || '').toLowerCase();
            const filtered = items.filter(i => (i.titulo || '').toLowerCase().includes(query) || (i.tags || '').toLowerCase().includes(query));
            container.innerHTML = filtered.map(i => `
                <div class="card-mini" onclick="openEdit('${i.id}')">
                    <img src="${i.imgUrl || 'https://via.placeholder.com/150x80'}" onerror="this.src='https://via.placeholder.com/150x80'">
                    <div style="font-size:11px; font-weight:bold; margin-top:5px; color:var(--primary)">${i.titulo}</div>
                </div>
            `).join('');
        }

        function openEdit(id) {
            const item = items.find(i => i.id === id);
            if (!item) return;
            document.getElementById('edit-id').value = item.id;
            document.getElementById('edit-titulo').value = item.titulo;
            document.getElementById('edit-pos').value = item.promptPos;
            document.getElementById('edit-prev-img').src = item.imgUrl || '';
            document.getElementById('modal-edit').classList.add('open');
        }

        function closeModal() { document.getElementById('modal-edit').classList.remove('open'); }

        async function saveEdit() {
            const id = document.getElementById('edit-id').value;
            const idx = items.findIndex(i => i.id === id);
            if (idx > -1) {
                items[idx] = { ...items[idx], 
                    titulo: document.getElementById('edit-titulo').value,
                    promptPos: document.getElementById('edit-pos').value
                };
                saveLocal();
                filterList(document.getElementById('res-search').value);
                closeModal();
            }
        }

        function deleteItem() {
            const id = document.getElementById('edit-id').value;
            document.getElementById('confirm-overlay').style.display = 'flex';
            document.getElementById('confirm-yes').onclick = () => {
                items = items.filter(i => i.id !== id);
                saveLocal();
                filterList(document.getElementById('res-search').value);
                document.getElementById('confirm-overlay').style.display = 'none';
                closeModal();
            };
        }

        document.getElementById('confirm-no').onclick = () => document.getElementById('confirm-overlay').style.display = 'none';

        async function handleSave() {
            loadLocal();
            items.unshift({
                id: 'p' + Date.now(),
                titulo: document.getElementById('inp-titulo').value || 'Sin título',
                promptPos: document.getElementById('inp-pos').value,
                imgUrl: document.getElementById('inp-img').value,
                tags: document.getElementById('inp-tags').value
            });
            saveLocal();
            clearForm();
        }

        function clearForm() {
            document.querySelectorAll('input, textarea').forEach(i => i.value = '');
            document.getElementById('prev-img').src = '';
        }

        loadLocal();
    </script>
</body>
</html>
