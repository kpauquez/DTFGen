<!DOCTYPE html> 
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prompt Vault Panel - Vivaldi</title>
    <style>
        :root { --primary: #22d3ee; --bg: #0f172a; --card: #1e293b; --text: #ffffff; --accent: #8b5cf6; --border: #334155; --red: #f87171; }
        body { font-family: sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        .view { display: none; flex-direction: column; height: 100%; padding: 15px; box-sizing: border-box; overflow-y: auto; }
        .view.active { display: flex; }
        label { display: block; font-size: 0.75rem; color: var(--primary); margin-bottom: 4px; font-weight: bold; margin-top: 10px; text-transform: uppercase; }
        input, textarea { width: 100%; background: #1e293b; color: white; border: 1px solid var(--border); border-radius: 6px; padding: 10px; box-sizing: border-box; font-size: 14px; outline: none; font-family: inherit; }
        textarea { resize: vertical; min-height: 60px; }
        .preview-box { width: 100%; height: 150px; background: #000; border-radius: 8px; border: 1px dashed var(--border); overflow: hidden; display: flex; align-items: center; justify-content: center; margin-bottom: 5px; }
        .preview-box img { max-width: 100%; max-height: 100%; object-fit: cover; }
        .btn-row { display: flex; gap: 8px; margin-top: 15px; }
        .btn { flex: 1; padding: 12px; border-radius: 6px; border: none; font-weight: bold; cursor: pointer; font-family: inherit; }
        .btn-save { background: var(--primary); color: #000; }
        .btn-cancel { background: var(--border); color: white; }
        .btn-delete { background: transparent; color: var(--red); border: 1px solid var(--red); }
        .card-mini { background: var(--card); border-radius: 8px; padding: 8px; margin-bottom: 10px; border: 1px solid var(--border); cursor: pointer; transition: 0.2s; }
        .card-mini:hover { border-color: var(--primary); }
        .card-mini img { width: 100%; height: 80px; object-fit: cover; border-radius: 4px; }
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); backdrop-filter: blur(4px); display: none; align-items: center; justify-content: center; z-index: 2000; padding: 15px; }
        .modal-overlay.open { display: flex; }
        .modal { background: var(--bg); border: 1px solid var(--border); border-radius: 12px; width: 100%; max-height: 90vh; overflow-y: auto; padding: 20px; position: relative; }
        .bottom-control-bar { position: sticky; bottom: 0; background: var(--card); padding: 10px; border-top: 1px solid var(--primary); display: flex; gap: 10px; align-items: center; z-index: 100; box-sizing: border-box; }
        .btn-add-bottom { background: var(--primary); color: #000; width: 45px; height: 45px; border-radius: 50%; border: none; font-size: 28px; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; padding: 0; line-height: 1; box-shadow: 0 2px 8px rgba(34,211,238,0.3); }
        .search-area { margin-top: 20px; border-top: 1px solid var(--border); padding-top: 15px; display: flex; gap: 5px; }
    </style>
</head>
<body>

    <div id="view-new" class="view active">
        <h3 style="margin:0; color:var(--primary)">Captura Rápida</h3>
        <div class="preview-box"><img id="prev-img" src="" onerror="this.src='https://via.placeholder.com/300x150?text=Vista+Previa'"></div>
        <label>URL Imagen</label>
        <input type="text" id="inp-img" placeholder="URL..." oninput="document.getElementById('prev-img').src=this.value">
        <label>Título</label>
        <input type="text" id="inp-titulo">
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
            <div><label>Categoría</label><input type="text" id="inp-cat"></div>
            <div><label>Modelo IA</label><input type="text" id="inp-model"></div>
        </div>
        <label>Prompt Positivo</label><textarea id="inp-pos"></textarea>
        <label>Prompt Negativo</label><textarea id="inp-neg"></textarea>
        <label>Hashtags</label><input type="text" id="inp-tags">
        <label>Notas</label><textarea id="inp-notas" rows="2"></textarea>
        <div class="btn-row">
            <button class="btn btn-cancel" onclick="clearForm()">Limpiar</button>
            <button class="btn btn-save" onclick="handleSave()">Guardar Prompt</button>
        </div>
        <div class="search-area">
            <input type="text" id="main-search" placeholder="Buscar...">
            <button class="btn btn-save" style="flex:0; padding:10px;" onclick="showResults()">🔍</button>
        </div>
    </div>

    <div id="view-results" class="view">
        <h3 style="margin:0; color:var(--primary)">Resultados</h3>
        <div id="list-container" style="flex:1; margin-top:15px;"></div>
        <div class="bottom-control-bar">
            <button class="btn-add-bottom" onclick="showNew()">+</button>
            <input type="text" id="res-search" placeholder="Filtrar..." oninput="filterList(this.value)">
            <button class="btn btn-cancel" style="flex:0; width: 40px;" onclick="showNew()">✕</button>
        </div>
    </div>

    <div class="modal-overlay" id="modal-edit">
        <div class="modal">
            <h3 style="color:var(--primary)">Editar Prompt</h3>
            <input type="hidden" id="edit-id">
            <div class="preview-box" style="height: 120px;"><img id="edit-prev-img" src=""></div>
            <label>Título</label><input type="text" id="edit-titulo">
            <label>Prompt Positivo</label><textarea id="edit-pos" rows="4"></textarea>
            <label>Prompt Negativo</label><textarea id="edit-neg" rows="2"></textarea>
            <label>Tags</label><input type="text" id="edit-tags">
            <label>Notas</label><textarea id="edit-notas" rows="2"></textarea>
            <div class="btn-row">
                <button class="btn btn-save" onclick="saveEdit()">Actualizar</button>
                <button class="btn btn-delete" onclick="deleteItem()">Eliminar</button>
            </div>
            <button class="btn btn-cancel" style="width:100%; margin-top:10px;" onclick="closeModal()">Cerrar</button>
        </div>
    </div>

    <!-- Modal de confirmación (reemplaza confirm() que Vivaldi puede bloquear) -->
    <div id="confirm-overlay" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.85); align-items:center; justify-content:center; z-index:3000; padding:20px;">
        <div style="background:#1e293b; border:1px solid #f87171; border-radius:12px; padding:24px; width:100%; max-width:280px; text-align:center;">
            <div style="font-size:1.5rem; margin-bottom:10px;">🗑️</div>
            <p style="color:#fff; margin-bottom:20px; font-size:14px;">¿Eliminar este prompt permanentemente?</p>
            <div style="display:flex; gap:10px;">
                <button id="confirm-yes" style="flex:1; background:#f87171; color:#000; border:none; padding:12px; border-radius:6px; font-weight:bold; cursor:pointer;">Eliminar</button>
                <button id="confirm-no" style="flex:1; background:#334155; color:#fff; border:none; padding:12px; border-radius:6px; font-weight:bold; cursor:pointer;">Cancelar</button>
            </div>
        </div>
    </div>

    <script>
        let items = [];
        let tools = [];

        // ── Canal de sincronización en tiempo real con index.html ──────────
        const vaultChannel = new BroadcastChannel('vault_sync');

        // Recibir cambios desde index.html
        vaultChannel.onmessage = (e) => {
            if (e.data && e.data.type === 'vault_updated') {
                items = e.data.items || items;
                tools = e.data.tools || tools;
                localStorage.setItem('vault_data', JSON.stringify(items));
                localStorage.setItem('vault_tools', JSON.stringify(tools));
                // Refrescar lista si estamos en vista resultados
                const resView = document.getElementById('view-results');
                if (resView.classList.contains('active')) {
                    filterList(document.getElementById('res-search').value);
                }
            }
        };

        // Notificar a index.html después de cada cambio local
        function notifyIndex() {
            vaultChannel.postMessage({ type: 'vault_updated', items, tools });
        }

        function loadLocal() {
            try {
                items = JSON.parse(localStorage.getItem('vault_data')) || [];
                tools = JSON.parse(localStorage.getItem('vault_tools')) || [];
            } catch (e) { items = []; tools = []; }
        }

        function saveLocal() {
            localStorage.setItem('vault_data', JSON.stringify(items));
            notifyIndex();
        }

        // ── Botón Eliminar ────────────────────────────────────────────────
        // Usamos un modal propio en lugar de confirm() (que Vivaldi puede bloquear en webpanels)
        function deleteItem() {
            const idParaBorrar = document.getElementById('edit-id').value;
            if (!idParaBorrar) return;
            document.getElementById('confirm-overlay').style.display = 'flex';
            document.getElementById('confirm-overlay').dataset.targetId = idParaBorrar;
        }

        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('confirm-yes').onclick = async () => {
                const idParaBorrar = document.getElementById('confirm-overlay').dataset.targetId;
                items = items.filter(i => i.id !== idParaBorrar);
                saveLocal();
                filterList(document.getElementById('res-search').value);
                const cfg = JSON.parse(localStorage.getItem('vault_config')) || {};
                if (cfg.token && cfg.repo) {
                    try { await pushToGH(cfg); } catch(e) { console.error("Error nube:", e); }
                }
                document.getElementById('confirm-overlay').style.display = 'none';
                closeModal();
            };
            document.getElementById('confirm-no').onclick = () => {
                document.getElementById('confirm-overlay').style.display = 'none';
            };
        });

        function showResults() {
            loadLocal();
            const q = document.getElementById('main-search').value;
            document.getElementById('res-search').value = q;
            document.getElementById('view-new').classList.remove('active');
            document.getElementById('view-results').classList.add('active');
            filterList(q);
        }

        function showNew() {
            document.getElementById('view-results').classList.remove('active');
            document.getElementById('view-new').classList.add('active');
        }

        function filterList(val) {
            const container = document.getElementById('list-container');
            const query = (val || '').toLowerCase();
            const filtered = items.filter(i =>
                (i.titulo || '').toLowerCase().includes(query) ||
                (i.tags || '').toLowerCase().includes(query)
            );
            container.innerHTML = filtered.map(i => `
                <div class="card-mini" onclick="openEdit('${i.id}')">
                    <img src="${i.imgUrl || 'https://via.placeholder.com/150x80'}" onerror="this.src='https://via.placeholder.com/150x80?text=No+Img'">
                    <div style="font-size:12px; font-weight:bold; margin-top:5px; color:var(--primary)">${i.titulo || 'Sin título'}</div>
                </div>
            `).join('');
        }

        function openEdit(id) {
            const item = items.find(i => i.id === id);
            if (!item) return;
            document.getElementById('edit-id').value = item.id;
            document.getElementById('edit-titulo').value = item.titulo || '';
            document.getElementById('edit-pos').value = item.promptPos || '';
            document.getElementById('edit-neg').value = item.promptNeg || '';
            document.getElementById('edit-tags').value = item.tags || '';
            document.getElementById('edit-notas').value = item.notas || '';
            document.getElementById('edit-prev-img').src = item.imgUrl || '';
            document.getElementById('modal-edit').classList.add('open');
        }

        function closeModal() { document.getElementById('modal-edit').classList.remove('open'); }

        async function saveEdit() {
            const id = document.getElementById('edit-id').value;
            const idx = items.findIndex(i => i.id === id);
            if (idx > -1) {
                items[idx] = { ...items[idx],
                    titulo: document.getElementById('edit-titulo').value,
                    promptPos: document.getElementById('edit-pos').value,
                    promptNeg: document.getElementById('edit-neg').value,
                    tags: document.getElementById('edit-tags').value,
                    notas: document.getElementById('edit-notas').value
                };
                saveLocal();
                filterList(document.getElementById('res-search').value);
                const cfg = JSON.parse(localStorage.getItem('vault_config')) || {};
                if (cfg.token && cfg.repo) await pushToGH(cfg);
                closeModal();
            }
        }

        async function handleSave() {
            loadLocal();
            const entry = {
                id: 'p' + Date.now(),
                titulo: document.getElementById('inp-titulo').value || 'Sin título',
                promptPos: document.getElementById('inp-pos').value,
                promptNeg: document.getElementById('inp-neg').value,
                imgUrl: document.getElementById('inp-img').value,
                categoria: document.getElementById('inp-cat').value || 'Gral',
                modelo: document.getElementById('inp-model').value || 'SDXL',
                tags: document.getElementById('inp-tags').value,
                notas: document.getElementById('inp-notas').value,
                fav: false
            };
            items.unshift(entry);
            saveLocal();
            const cfg = JSON.parse(localStorage.getItem('vault_config')) || {};
            if (cfg.token && cfg.repo) await pushToGH(cfg);
            clearForm();
            showToastPanel("✓ Guardado");
        }

        function clearForm() {
            document.querySelectorAll('#view-new input, #view-new textarea').forEach(i => i.value = '');
            document.getElementById('prev-img').src = '';
        }

        function showToastPanel(msg) {
            let t = document.getElementById('panel-toast');
            if (!t) {
                t = document.createElement('div');
                t.id = 'panel-toast';
                t.style.cssText = 'position:fixed;bottom:70px;left:50%;transform:translateX(-50%);background:var(--primary);color:#000;padding:10px 20px;border-radius:8px;font-weight:bold;z-index:5000;font-size:13px;';
                document.body.appendChild(t);
            }
            t.innerText = msg;
            t.style.display = 'block';
            setTimeout(() => t.style.display = 'none', 2000);
        }

        async function pushToGH(cfg) {
            try {
                const url = `https://api.github.com/repos/${cfg.repo}/contents/${cfg.path}`;
                const res = await fetch(url, { headers: { Authorization: `token ${cfg.token}` } });
                let sha = res.ok ? (await res.json()).sha : "";
                const content = btoa(unescape(encodeURIComponent(JSON.stringify({ prompts: items, tools: tools }, null, 2))));
                await fetch(url, {
                    method: 'PUT',
                    headers: { Authorization: `token ${cfg.token}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: "Update via Panel", content, sha })
                });
            } catch (e) { console.error("Error sync:", e); }
        }

        loadLocal();
    </script>
</body>
</html>
